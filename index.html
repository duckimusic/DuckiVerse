<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendLog Dashboard</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --paper: #fdfdfd; --ink: #222; --accent: #58a6ff; --green: #3fb950; --gold: #d4a017; }
        body { background: var(--bg); color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Dashboard Header */
        .header { padding: 25px 20px; background: linear-gradient(180deg, #222 0%, var(--bg) 100%); text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: left; }
        .stat-card small { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card div { font-size: 18px; font-weight: bold; color: var(--accent); margin-top: 5px; }

        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .tab { padding: 10px 20px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: bold; }

        .view { display: none; padding: 0 20px; max-width: 500px; margin: 0 auto; }
        .view.active { display: block; }

        /* Input Area */
        .input-group { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: #0f0; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: monospace; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        
        /* Receipt Style for Logs */
        .entry { background: var(--paper); color: var(--ink); padding: 20px; margin-bottom: 25px; border-radius: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); position: relative; }
        .receipt-header { text-align: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px; margin-bottom: 10px; }
        .item-row { display: flex; justify-content: space-between; font-size: 14px; font-family: monospace; margin: 4px 0; }
        .total-row { border-top: 2px solid #222; margin-top: 10px; padding-top: 10px; display: flex; justify-content: space-between; font-weight: bold; }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-s { background: #eee; color: #555; font-size: 10px; padding: 5px; flex: 1; }

        .summary-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--gold); color: #000; padding: 18px; text-align: center; font-weight: bold; z-index: 100; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; letter-spacing: 2px;">SPENDLOG 2026</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <small>This Month</small>
                <div id="stat-month">0</div>
            </div>
            <div class="stat-card">
                <small>Year Total</small>
                <div id="stat-year" style="color:var(--green)">0</div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('daily')">LOGS</div>
        <div class="tab" onclick="switchTab('import')">IMPORT</div>
        <div class="tab" onclick="switchTab('settings')">UTILITY</div>
    </div>

    <div id="view-daily" class="view active">
        <div class="input-group">
            <input type="date" id="date-input">
            <input type="text" id="item-input" placeholder="Name (Coffee + Bread)">
            <input type="text" id="cost-input" placeholder="Price (20k + 15k)">
            <button class="btn-main" onclick="saveEntry()">PRINT RECEIPT</button>
        </div>
        <div id="list">Loading...</div>
    </div>

    <div id="view-import" class="view">
        <div class="input-group">
            <h3 style="margin-top:0">Bulk Upload</h3>
            <p style="font-size:12px; color:#888;">Paste your weekly notes here:</p>
            <textarea id="bulk-input" rows="10" placeholder="(23/3 - 29/3)&#10;T2 : 30k (coffee)&#10;T3 : 90k (gas + fix)"></textarea>
            <button class="btn-main" style="background:var(--green)" onclick="importData()">CONFIRM BULK IMPORT</button>
        </div>
    </div>

    <div id="view-settings" class="view">
        <div class="input-group">
            <h3>Reports</h3>
            <button class="btn-s" style="padding:15px; margin-bottom:10px" onclick="copyWeeklyReport()">COPY ALL DATA (BACKUP)</button>
            <button class="btn-s" style="padding:15px; color:var(--danger)" onclick="clearAllData()">RESET ALL (START OVER)</button>
        </div>
        <p style="text-align:center; color:#555; font-size:10px;">Cloudflare KV Connection Active</p>
    </div>

    <div class="summary-bar">
        DAILY AVG: <span id="stat-avg">0</span>vn₫
    </div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        let spendings = [];
        const dayMap = { 'T2': 0, 'T3': 1, 'T4': 2, 'T5': 3, 'T6': 4, 'T7': 5, 'CN': 6 };

        document.getElementById('date-input').valueAsDate = new Date();

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(`view-${tabId}`).classList.add('active');
        }

        function formatMoney(num) {
            return new Intl.NumberFormat('vi-VN').format(Math.round(num));
        }

        function parsePrice(str) {
            if (!str) return 0;
            let val = str.toLowerCase().replace(/vnd|vnđ| /g, '');
            if (val.includes('k')) return (parseFloat(val.replace('k', '')) || 0) * 1000;
            return parseFloat(val) || 0;
        }

        async function loadData() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                spendings = Array.isArray(data) ? data : [];
                render();
            } catch (e) { console.error(e); }
        }

        async function sync() {
            try { await fetch(API, { method: "POST", body: JSON.stringify(spendings) }); }
            catch (e) { alert("Sync Error!"); }
        }

        function calculateActualDate(rangeStr, dayCode) {
            const yearMatch = rangeStr.match(/\b(20\d{2})\b/);
            const year = yearMatch ? parseInt(yearMatch[1]) : 2026;
            const match = rangeStr.match(/(\d+)\/(\d+)/);
            if (!match) return document.getElementById('date-input').value;
            let d = new Date(year, parseInt(match[2]) - 1, parseInt(match[1]));
            const offset = dayMap[dayCode.toUpperCase()];
            if (offset !== undefined) d.setDate(d.getDate() + offset);
            return d.toISOString().split('T')[0];
        }

        function addRecord(date, names, prices) {
            let entry = spendings.find(s => s.date === date);
            if (!entry) {
                entry = { date, cost: 0, details: [] };
                spendings.push(entry);
            }
            names.forEach((name, i) => {
                entry.details.push({ name: name.toUpperCase().trim(), price: prices[i] });
            });
            entry.cost = entry.details.reduce((sum, item) => sum + item.price, 0);
        }

        async function importData() {
            const raw = document.getElementById('bulk-input').value;
            const lines = raw.split('\n');
            const header = lines.find(l => l.includes('/') && l.includes('(')) || "";
            let currentDay = null;

            lines.forEach(line => {
                const dayMatch = line.match(/^(T\d|CN)\s*:/i);
                if (dayMatch) currentDay = dayMatch[1].toUpperCase();
                if (!currentDay) return;
                const targetDate = calculateActualDate(header, currentDay);
                const content = line.replace(/^(T\d|CN)\s*:\s*/i, '');
                const regex = /([\d.k]+)\s*\(([^)]+)\)/g;
                let match;
                while ((match = regex.exec(content)) !== null) {
                    const price = parsePrice(match[1]);
                    const items = match[2].split(/[+/]/).map(n => n.trim()).filter(n => n);
                    addRecord(targetDate, items, Array(items.length).fill(price / items.length));
                }
            });
            await sync(); render(); switchTab('daily');
        }

        function render() {
            const now = new Date();
            const curMonth = now.getMonth();
            const curYear = now.getFullYear();

            let totalMonth = 0;
            let totalYear = 0;
            let dayCount = spendings.length;

            const sorted = [...spendings].sort((a,b) => new Date(b.date) - new Date(a.date));
            
            document.getElementById('list').innerHTML = sorted.map(s => {
                const d = new Date(s.date);
                if (d.getFullYear() === curYear) {
                    totalYear += s.cost;
                    if (d.getMonth() === curMonth) totalMonth += s.cost;
                }

                return `
                <div class="entry">
                    <div class="receipt-header">
                        <strong>${s.date.split('-').reverse().join('/')}</strong>
                    </div>
                    <div class="receipt-body">
                        ${s.details.map(i => `<div class="item-row"><span>${i.name}</span><span>${formatMoney(i.price)}</span></div>`).join('')}
                    </div>
                    <div class="total-row"><span>TOTAL</span><span>${formatMoney(s.cost)}vnd</span></div>
                    <div class="actions">
                        <button class="btn-s" onclick="deleteItem('${s.date}')">VOID</button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('stat-month').innerText = formatMoney(totalMonth);
            document.getElementById('stat-year').innerText = formatMoney(totalYear);
            document.getElementById('stat-avg').innerText = formatMoney(dayCount ? totalYear / dayCount : 0);
        }

        async function saveEntry() {
            const date = document.getElementById('date-input').value;
            const names = document.getElementById('item-input').value.split('+');
            const prices = document.getElementById('cost-input').value.split('+').map(p => parsePrice(p.trim()));
            addRecord(date, names, prices);
            await sync(); render();
            document.getElementById('item-input').value = ""; document.getElementById('cost-input').value = "";
        }

        async function deleteItem(date) {
            if(confirm("Delete this entry?")) {
                spendings = spendings.filter(s => s.date !== date);
                await sync(); render();
            }
        }

        function clearAllData() {
            if(confirm("DANGER: This will delete ALL history. Continue?")) {
                spendings = [];
                sync().then(() => render());
            }
        }

        loadData();
    </script>
</body>
</html>
