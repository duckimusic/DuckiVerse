<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendLog 13.5 - Zero Delay</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style id="theme-style">
        :root { 
            --bg: #0d1117; --card: rgba(13, 17, 23, 0.8); --accent: #58a6ff; 
            --green: #3fb950; --gold: #f2cc60; --danger: #f85149;
            --text: #e6edf3; --font: -apple-system, sans-serif;
            --border: 1px solid rgba(255,255,255,0.1); --fx: none;
            --receipt-bg: #fff; --receipt-text: #111; --bg-img: none;
            --blur: 15px; --glass-card: rgba(13, 17, 23, 0.8);
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1117; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo {
            width: 80px; height: 80px; border: 4px solid var(--accent);
            border-radius: 20%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 32px; color: var(--accent);
            animation: pulse 2s infinite ease-in-out;
        }
        .splash-bar { width: 150px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 30px; position: relative; overflow: hidden; }
        .splash-progress { width: 0%; height: 100%; background: var(--accent); position: absolute; animation: load 2.5s forwards linear; }
        
        #welcome-msg { 
            display: none; text-align: center; margin-top: 20px; 
            animation: fadeIn 0.5s ease-in, pulse 1.5s infinite; 
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes load { to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hide-splash { opacity: 0; visibility: hidden; }

        body { 
            background: var(--bg); background-image: var(--bg-img); background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); font-family: var(--font); margin: 0; padding-bottom: 100px; transition: 0.8s ease; overflow-x: hidden; filter: var(--filter, none);
        }

        #scanlines { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.15; display: var(--fx);
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            background-size: 100% 3px, 3px 100%;
        }

        .nav-tabs { display: flex; position: sticky; top: 0; background: var(--glass-card); border-bottom: var(--border); z-index: 1000; backdrop-filter: blur(var(--blur)); }
        .nav-tab { flex: 1; padding: 15px 5px; text-align: center; font-size: 10px; font-weight: 800; cursor: pointer; color: #8b949e; text-transform: uppercase; }
        .nav-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        .view { display: none; padding: 20px; max-width: 500px; margin: 0 auto; filter: var(--view-filter, none); }
        .view.active { display: block; }

        .receipt { 
            background: var(--receipt-bg); color: var(--receipt-text); padding: 18px; border-radius: 2px; margin-bottom: 15px; 
            font-family: monospace; border: var(--border); transition: 0.4s; transform: var(--receipt-tilt, none);
        }
        .r-head { border-bottom: 1px dashed rgba(0,0,0,0.2); text-align: center; padding-bottom: 8px; margin-bottom: 8px; font-weight: bold; }
        .r-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
        .r-total { border-top: 1px solid currentColor; margin-top: 8px; padding-top: 6px; display: flex; justify-content: space-between; font-weight: bold; }
        .del-btn { color: var(--danger); font-weight: bold; cursor: pointer; padding-left: 12px; }

        .input-group { background: var(--glass-card); padding: 20px; border-radius: 12px; border: var(--border); margin-bottom: 15px; backdrop-filter: blur(var(--blur)); }
        input, textarea, select { width: 100%; padding: 12px; margin: 6px 0; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: var(--accent); border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .wheel-container { position: relative; width: 300px; height: 300px; margin: 25px auto; }
        #wheel-canvas { width: 100%; height: 100%; transition: 5s cubic-bezier(0.15, 0, 0.1, 1); }
        #pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--gold); z-index: 10; }
        .wheel-hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; background: var(--gold); border-radius: 50%; border: 3px solid var(--bg); z-index: 5; }

        #calc-toggle { position: fixed; right: 20px; bottom: 85px; background: var(--gold); color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 2000; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #calc-panel { position: fixed; right: -320px; top: 0; width: 310px; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(30px); border-left: var(--border); z-index: 2001; transition: 0.5s; padding: 25px; box-sizing: border-box; }
        #calc-panel.open { right: 0; }
        .calc-screen { width: 100%; height: 85px; background: #000; color: var(--green); text-align: right; font-size: 30px; padding: 20px; box-sizing: border-box; border-radius: 4px; margin-bottom: 15px; border: var(--border); font-family: monospace; overflow-x: auto; white-space: nowrap; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { background: #1a1a1a; color: #fff; padding: 15px 5px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; font-weight: bold; font-size: 16px; transition: 0.2s; -webkit-user-select: none; user-select: none; }
        .calc-btn:active { background: #333; transform: scale(0.95); }
        .btn-op { color: var(--gold); }
        .btn-eq { background: var(--accent); color: white; }

        .total-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; z-index: 999; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        
        .range-outcome {
            background: var(--glass-card); border: 1px dashed var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 20px; font-family: monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="splash-content" style="display: flex; flex-direction: column; align-items: center;">
            <div class="splash-logo">☸</div>
            <div id="splash-status" style="margin-top: 15px; font-size: 12px; color: #8b949e; letter-spacing: 2px;">HIS 13.5 _ How I Spend</div>
            <div id="loader-wrapper" class="splash-bar">
                <div class="splash-progress"></div>
            </div>
        </div>

        <div id="welcome-msg">
            <div style="font-size: 22px; color: var(--accent); font-weight: bold; margin-bottom: 10px;">Welcome to How I Spent !</div>
            <div style="font-size: 11px; color: #8b949e; letter-spacing: 1px;">(press Spacebar or tap the screen)</div>
        </div>
    </div>

    <div id="scanlines"></div>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="showView('daily')">Logs</div>
        <div class="nav-tab" onclick="showView('analytics')">Graphs</div>
        <div class="nav-tab" onclick="showView('zen')">Eightfold</div>
        <div class="nav-tab" onclick="showView('tools')">Settings</div>
    </div>

    <div id="view-daily" class="view active">
        <div class="input-group">
            <input type="date" id="date-input">
            <input type="text" id="item-input" placeholder="Name (Gas + Coffee)">
            <input type="text" id="cost-input" placeholder="Price (50k + 25k)">
            <button class="btn" onclick="saveEntry()">SAVE RECEIPT</button>
        </div>
        <div id="daily-list"></div>
    </div>

    <div id="view-analytics" class="view">
        <div class="input-group" style="padding: 15px; margin-bottom: 20px;">
            <div style="font-size: 10px; color: var(--accent); font-weight: bold; margin-bottom: 8px; letter-spacing: 1px;">CALCULATE RANGE</div>
            <div style="display: flex; gap: 8px;">
                <input type="date" id="range-start">
                <input type="date" id="range-end">
            </div>
            <button class="btn" style="padding: 10px; margin-top: 8px; font-size: 12px;" onclick="calculateRangeOutcome()">CALCULATE RANGE</button>
        </div>
        <div id="range-result-area"></div>

        <div style="display: flex; gap: 6px; margin-bottom: 15px;">
            <button class="btn" style="flex: 1; padding: 10px; font-size: 11px;" onclick="updateChart('14d')">RECENT</button>
            <select id="month-picker" onchange="updateChart('month')" style="flex: 1; margin: 0;"></select>
        </div>
        <div style="background: var(--glass-card); border-radius: 12px; padding: 15px; height: 260px; border: var(--border); backdrop-filter: blur(var(--blur));">
            <canvas id="spendingChart"></canvas>
        </div>
    </div>

    <div id="view-zen" class="view">
        <div id="dhammapada-container" style="background: var(--glass-card); padding: 30px 20px; border-radius: 20px; border: var(--border); text-align: center; backdrop-filter: blur(var(--blur)); box-shadow: 0 15px 35px rgba(0,0,0,0.2); position: relative; margin-bottom: 30px;">
            <div style="font-size: 24px; color: var(--gold); margin-bottom: 15px; opacity: 0.8;">☸</div>
            <div id="quote-chapter" style="font-size: 11px; color: var(--gold); letter-spacing: 3px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px;">HỆ THỐNG</div>
            <div id="quote-text" style="font-size: 18px; line-height: 1.8; color: var(--text); font-family: 'Times New Roman', serif; font-style: italic; margin-bottom: 20px; min-height: 100px; display: flex; align-items: center; justify-content: center;">"Đang tải..."</div>
            <div id="quote-ref" style="font-size: 13px; color: #8b949e; font-weight: bold; margin-bottom: 25px;">— Kệ số 0</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn" style="background: rgba(255,255,255,0.1); color: var(--gold); border: 1px solid var(--gold); flex: 1; padding: 10px; font-size: 12px;" onclick="copySutra()">SAO CHÉP</button>
                <button class="btn" style="background: var(--gold); color: #000; flex: 1; padding: 10px; font-size: 12px;" onclick="refreshQuote()">CÂU KỆ KHÁC</button>
            </div>
        </div>

        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px dashed var(--gold); margin-bottom: 30px;">
            <div style="font-size: 10px; color: var(--gold); margin-bottom: 10px; font-weight: bold; text-align: center; letter-spacing: 1px;">NHẬP PHÁP CÚ CLOUD</div>
            <select id="sutra-chapter-select">
                <option>Phẩm Song Yếu</option><option>Phẩm Không Phóng Giật</option><option>Phẩm Tâm</option>
                <option>Phẩm Hoa</option><option>Phẩm Kẻ Ngu</option><option>Phẩm Hiền Trí</option>
                <option>Phẩm A La Hán</option><option>Phẩm Ngàn</option><option>Phẩm Ác</option>
                <option>Phẩm Hình Phạt</option><option>Phẩm Già</option><option>Phẩm Tự Ngã</option>
                <option>Phẩm Thế Gian</option><option>Phẩm Phật Đà</option><option>Phẩm An Lạc</option>
                <option>Phẩm Hỷ Ái</option><option>Phẩm Phẫn Nộ</option><option>Phẩm Cấu Uế</option>
                <option>Phẩm Pháp Trụ</option><option>Phẩm Đạo</option><option>Phẩm Tạp Lục</option>
                <option>Phẩm Địa Ngục</option><option>Phẩm Voi</option><option>Phẩm Tham Ái</option>
                <option>Phẩm Tỳ Kheo</option><option>Phẩm Bà La Môn</option>
            </select>
            <textarea id="sutra-content-input" rows="4" placeholder="Dán nội dung câu kệ..."></textarea>
            <input type="text" id="sutra-id-input" value="Kệ số " placeholder="Ví dụ: Kệ số 85-86">
            <button class="btn" style="background: var(--gold); color: #000; margin-top: 10px;" onclick="saveSutra()">LƯU VÀO CLOUD</button>
            <button class="btn" style="background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 10px; font-size: 10px; padding: 5px;" onclick="clearZenData()">XOÁ HẾT PHÁP CÚ</button>
        </div>

        <div id="zen-res" style="text-align: center; font-weight: 900; color: var(--gold); font-size: 20px; margin-bottom: 15px; letter-spacing: 2px;">HÔM NAY TU TẬP</div>
        <div class="wheel-container">
            <div id="pointer"></div><div class="wheel-hub"></div>
            <canvas id="wheel-canvas" width="800" height="800"></canvas>
        </div>
        <button class="btn" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); margin-top: 20px;" onclick="spin()">XOAY BÁT CHÁNH ĐẠO</button>

        <div id="zen-library-container" style="margin-top: 40px; background: var(--glass-card); padding: 15px; border-radius: 12px; border: var(--border); backdrop-filter: blur(var(--blur));">
            <div id="zen-list" style="max-height: 400px; overflow-y: auto; font-size: 13px;"></div>
        </div>
    </div>

    <div id="view-tools" class="view">
        <div class="input-group">
            <label style="font-size: 11px; color: #8b949e; font-weight: bold;">THEME ATMOSPHERE</label>
            <select onchange="applyAtmosphere(this.value)">
                <option value="default">Matrix (Default)</option><option value="glass">Glassmorphism</option>
                <option value="retro">80s Retro</option><option value="cyber">Cyberpunk</option><option value="horror">Uncanny horror</option>
            </select>
        </div>
        <textarea id="bulk-input" rows="8" placeholder="Paste report (T2: 50k...) here..."></textarea>
        <button class="btn" style="background: var(--green); margin-top: 10px;" onclick="importData()">SYNC BULK REPORT</button>
        <button class="btn" style="background:transparent; border:1px solid var(--danger); color:var(--danger); margin-top:40px" onclick="clearAllData()">WIPE ALL SPENDING</button>
    </div>

    <div id="calc-toggle" onclick="toggleCalc()">CALC</div>
    
    <div id="calc-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span style="color: var(--gold); font-weight: bold; font-size: 12px;">CASIO MODE</span>
            <span style="cursor: pointer; color: var(--danger); font-weight: bold;" onclick="toggleCalc()">ĐÓNG [X]</span>
        </div>
        <div class="calc-screen" id="calc-display">0</div>
        <div class="calc-grid">
            <div class="calc-btn btn-op" onclick="calcClear()">C</div>
            <div class="calc-btn btn-op" onclick="calcInput('(')">(</div>
            <div class="calc-btn btn-op" onclick="calcInput(')')">)</div>
            <div class="calc-btn btn-op" onclick="calcCmd('/')">÷</div>

            <div class="calc-btn" onclick="calcInput('7')">7</div>
            <div class="calc-btn" onclick="calcInput('8')">8</div>
            <div class="calc-btn" onclick="calcInput('9')">9</div>
            <div class="calc-btn btn-op" onclick="calcCmd('*')">×</div>

            <div class="calc-btn" onclick="calcInput('4')">4</div>
            <div class="calc-btn" onclick="calcInput('5')">5</div>
            <div class="calc-btn" onclick="calcInput('6')">6</div>
            <div class="calc-btn btn-op" onclick="calcCmd('-')">-</div>

            <div class="calc-btn" onclick="calcInput('1')">1</div>
            <div class="calc-btn" onclick="calcInput('2')">2</div>
            <div class="calc-btn" onclick="calcInput('3')">3</div>
            <div class="calc-btn btn-op" onclick="calcCmd('+')">+</div>

            <div class="calc-btn" onclick="calcInput('0')">0</div>
            <div class="calc-btn" onclick="calcInput('.')">.</div>
            <div class="calc-btn btn-op" onclick="calcPercent()">%</div>
            <div class="calc-btn btn-eq" onclick="calcSolve()">=</div>
        </div>
    </div>

    <div class="total-footer">TOTAL: <span id="grand-total-val">0k</span></div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        const PATHS = ["Chánh Kiến", "Chánh Tư Duy", "Chánh Ngữ", "Chánh Nghiệp", "Chánh Mạng", "Chánh Tinh Tấn", "Chánh Niệm", "Chánh Định"];
        let spendings = [], myChart = null, wheelAngle = 0;

        // ==========================================
        // 1. DUCKI SOUND ENGINE
        // ==========================================
        const USER_SOUNDS = {
            open: "https://github.com/duckimusic/DuckiVerse/raw/refs/heads/main/openapp.wav",
            click: "https://github.com/duckimusic/DuckiVerse/raw/refs/heads/main/picktab.wav",
            wheel: "https://github.com/duckimusic/DuckiVerse/raw/refs/heads/main/spinpwheel.wav",
            success: "https://github.com/duckimusic/DuckiVerse/raw/refs/heads/main/calculated.wav"
        };
        const AUDIO_POOL = {};
        function preloadSounds() {
            for (const [key, url] of Object.entries(USER_SOUNDS)) {
                const audio = new Audio(); audio.src = url; audio.preload = "auto"; audio.load(); AUDIO_POOL[key] = audio;
            }
        }
        function playSfx(type) {
            if (AUDIO_POOL[type]) {
                const soundClone = AUDIO_POOL[type].cloneNode();
                soundClone.volume = (type === 'click') ? 0.4 : 0.7;
                soundClone.play().catch(e => {});
            }
        }
        preloadSounds();

        // ==========================================
        // 2. SPLASH LOGIC
        // ==========================================
        let isLoaded = false, appStarted = false;
        window.onload = () => {
            setTimeout(() => { isLoaded = true; document.getElementById('splash-content').style.display = 'none'; document.getElementById('welcome-msg').style.display = 'block'; }, 2600);
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date-input').value = today;
            document.getElementById('range-start').value = today;
            document.getElementById('range-end').value = today;
            const monthPicker = document.getElementById('month-picker');
            const currentMonth = new Date().getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            monthPicker.innerHTML = monthNames.map((name, i) => `<option value="${i}" ${i === currentMonth ? 'selected' : ''}>${name}</option>`).join('');
            drawWheel(); load(); 
        };
        function startApp() { if (isLoaded && !appStarted) { appStarted = true; playSfx('open'); document.getElementById('splash-screen').classList.add('hide-splash'); } }
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') startApp(); });
        window.addEventListener('click', startApp);

        // ==========================================
        // 3. CORE LOGIC
        // ==========================================
        function formatK(n) { return Math.floor(Number(n)/1000).toLocaleString() + "k"; }
        function toBigInt(val) { return BigInt(String(val).toLowerCase().replace(/k/g, '000').replace(/[^\d]/g, '') || 0); }

        async function sync() {
            try {
                const data = spendings.map(s => s.isSutra ? s : { ...s, cost: s.cost.toString(), details: s.details.map(d => ({ ...d, price: d.price.toString() })) });
                await fetch(API, {method:"POST", body:JSON.stringify(data)});
            } catch(e) {}
        }
        async function load() {
            try {
                const res = await fetch(API);
                const data = await res.json() || [];
                spendings = data.map(s => s.isSutra ? s : { ...s, cost: BigInt(s.cost || 0), details: s.details.map(d => ({ ...d, price: BigInt(d.price || 0) })) });
                render(); refreshQuote();
            } catch(e) {}
        }

        function calculateRangeOutcome() {
            playSfx('success');
            const start = document.getElementById('range-start').value, end = document.getElementById('range-end').value;
            if(!start || !end) return;
            const filtered = spendings.filter(s => !s.isSutra && s.date >= start && s.date <= end).sort((a,b) => a.date.localeCompare(b.date));
            let total = 0n;
            let listHtml = filtered.map(s => { total += s.cost; return `<div>• [${s.date.split('-').reverse().slice(0,2).join('/')}] ${s.details.map(d => d.name).join(', ')}: <b>${formatK(s.cost)}</b></div>`; }).join('');
            document.getElementById('range-result-area').innerHTML = `<div class="range-outcome"><div style="color:var(--accent); font-weight:bold; margin-bottom:8px;">(${start.split('-').reverse().slice(0,2).join('/')} - ${end.split('-').reverse().slice(0,2).join('/')})</div><div style="max-height:120px; overflow-y:auto; margin-bottom:8px; line-height:1.6;">${listHtml || "Trống."}</div><div style="border-top:1px dashed var(--accent); padding-top:8px; font-weight:bold; color:var(--gold);">TOTAL: ${formatK(total)}</div></div>`;
        }

        function render() {
            let grandTotal = 0n;
            const bills = spendings.filter(x => !x.isSutra).sort((a,b) => b.date.localeCompare(a.date));
            document.getElementById('daily-list').innerHTML = bills.map(s => {
                grandTotal += s.cost;
                return `<div class="receipt"><div class="r-head">${s.date}</div>${s.details.map((item, idx) => `<div class="r-row"><b>${item.name}</b><span>${formatK(item.price)} <span class="del-btn" onclick="deleteLine('${s.date}', ${idx})">×</span></span></div>`).join('')}<div class="r-total"><span>SUM</span><span>${formatK(s.cost)}</span></div></div>`;
            }).join('');
            document.getElementById('grand-total-val').innerText = formatK(grandTotal);
            const sutras = spendings.filter(x => x.isSutra).sort((a, b) => parseInt(String(a.r).match(/\d+/) || 0) - parseInt(String(b.r).match(/\d+/) || 0));
            document.getElementById('zen-list').innerHTML = sutras.length === 0 ? `<div style="text-align:center; color:#8b949e; padding:20px;">Trống.</div>` : sutras.map(s => `<div style="padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;"><div style="flex:1;"><b style="color:var(--gold);">Kệ ${s.r}:</b> <span style="font-size:10px; opacity:0.6;">[${s.c}]</span><div style="color:var(--text); font-style:italic; margin-top:4px;">${s.v.substring(0,60)}...</div></div><div class="del-btn" onclick="deleteSutra('${s.r}')">×</div></div>`).join('');
            updateChart('14d');
        }

        async function saveSutra() {
            playSfx('success');
            const chapter = document.getElementById('sutra-chapter-select').value, content = document.getElementById('sutra-content-input').value.trim(), rawId = document.getElementById('sutra-id-input').value.trim();
            const cleanId = rawId.replace(/Kệ số\s*/i, ""); if(!content || !cleanId) return;
            spendings = spendings.filter(s => !(s.isSutra && String(s.r) === String(cleanId)));
            spendings.push({ isSutra: true, c: chapter, v: content, r: cleanId });
            await sync(); document.getElementById('sutra-content-input').value = ""; render(); refreshQuote();
        }

        async function deleteSutra(id) { if(confirm(`Xoá Kệ ${id}?`)) { playSfx('click'); spendings = spendings.filter(s => !(s.isSutra && s.r === id)); await sync(); render(); refreshQuote(); } }
        async function clearZenData() { if(confirm("Xoá sạch Pháp Cú?")) { playSfx('click'); spendings = spendings.filter(s => !s.isSutra); await sync(); render(); refreshQuote(); } }
        function refreshQuote() {
            const sutras = spendings.filter(s => s.isSutra);
            const q = sutras.length > 0 ? sutras[Math.floor(Math.random()*sutras.length)] : {c:"Hệ thống", v:"Chưa có dữ liệu.", r:0};
            document.getElementById('quote-chapter').innerText = q.c.toUpperCase();
            document.getElementById('quote-text').innerText = `"${q.v}"`;
            document.getElementById('quote-ref').innerText = `— Kệ số ${q.r}`;
        }
        function copySutra() { playSfx('click'); const t = `${document.getElementById('quote-text').innerText}\n(${document.getElementById('quote-chapter').innerText} - ${document.getElementById('quote-ref').innerText})`; navigator.clipboard.writeText(t); alert("Coppied!"); }

        function updateChart(mode) {
            const ctx = document.getElementById('spendingChart').getContext('2d');
            let dataArr = spendings.filter(x => !x.isSutra).sort((a,b) => a.date.localeCompare(b.date));
            if(mode === 'month') { dataArr = dataArr.filter(s => new Date(s.date).getMonth() == document.getElementById('month-picker').value); } else { dataArr = dataArr.slice(-14); }
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'line', data: { labels: dataArr.map(s => s.date.slice(5)), datasets: [{ data: dataArr.map(s => Number(s.cost)/1000), borderColor: '#58a6ff', tension: 0.3 }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }

        async function saveEntry() {
            playSfx('success');
            const d = document.getElementById('date-input').value, names = document.getElementById('item-input').value.split('+'), costs = document.getElementById('cost-input').value.split('+');
            if(!d || names.length !== costs.length) return;
            let s = spendings.find(x => x.date === d && !x.isSutra); if(!s) { s = {date:d, cost:0n, details:[]}; spendings.push(s); }
            names.forEach((n, i) => s.details.push({name:n.toUpperCase().trim(), price:toBigInt(costs[i])}));
            s.cost = s.details.reduce((a,b) => a+b.price, 0n); await sync(); render();
        }

        async function importData() {
            playSfx('success');
            const raw = document.getElementById('bulk-input').value; if(!raw.trim()) return;
            const lines = raw.split('\n'); let anchor = null, count = 0;
            const vn = {"T2":0,"T3":1,"T4":2,"T5":3,"T6":4,"T7":5,"CN":6};
            lines.forEach(line => {
                const wm = line.match(/\((\d{1,2})\/(\d{1,2})/);
                if(wm) { anchor = new Date(2026, parseInt(wm[2])-1, parseInt(wm[1])); return; }
                const dm = line.match(/^(T2|T3|T4|T5|T6|T7|CN)\s*:\s*(.+)$/i);
                if(dm && anchor) {
                    const dObj = new Date(anchor); dObj.setDate(dObj.getDate() + vn[dm[1].toUpperCase()]);
                    const iso = dObj.toISOString().split('T')[0], parts = dm[2].split('+');
                    let s = spendings.find(x => x.date === iso && !x.isSutra); if(!s) { s = {date:iso, cost:0n, details:[]}; spendings.push(s); }
                    parts.forEach(p => { const pm = p.match(/(\d+)[kK]?/), nm = p.match(/\((.+?)\)/); if(pm) { s.details.push({name:(nm?nm[1]:"EXPENSE").toUpperCase().trim(), price:toBigInt(pm[1]||pm[0])}); count++; } });
                    s.cost = s.details.reduce((a,b) => a+b.price, 0n);
                }
            });
            if(count>0){ await sync(); render(); document.getElementById('bulk-input').value=""; }
        }

        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas'); const ctx = canvas.getContext('2d'); const arc = Math.PI*2/8;
            for(let i=0; i<8; i++) {
                ctx.beginPath(); ctx.fillStyle = i%2 ? "#161b22" : "#0d1117"; ctx.moveTo(400, 400); ctx.arc(400, 400, 380, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(400, 400); ctx.rotate(i*arc+arc/2); ctx.textAlign="center"; ctx.fillStyle=i%2?"#fff":"#f2cc60"; ctx.font="bold 42px sans-serif";
                ctx.fillText(PATHS[i], 250, 10); ctx.restore();
            }
        }
        function spin() { 
            let count = 0; const timer = setInterval(() => { playSfx('wheel'); if(++count > 20) clearInterval(timer); }, 150);
            wheelAngle += Math.floor(Math.random()*360) + 3600; 
            document.getElementById('wheel-canvas').style.transform = `rotate(${wheelAngle}deg)`; 
            setTimeout(() => { playSfx('success'); const idx = Math.floor(((270-(wheelAngle%360)+360)%360)/45); document.getElementById('zen-res').innerText = PATHS[idx].toUpperCase(); }, 5000); 
        }

        function showView(v){ playSfx('click'); document.querySelectorAll('.view').forEach(e=>e.classList.remove('active')); document.getElementById(`view-${v}`).classList.add('active'); }
        
        // ==========================================
        // 4. NEW CALCULATOR LOGIC
        // ==========================================
        let calcReset = false;
        function toggleCalc() { playSfx('click'); document.getElementById('calc-panel').classList.toggle('open'); }
        
        function calcInput(v) {
            playSfx('click');
            const display = document.getElementById('calc-display');
            if (calcReset) { display.innerText = ""; calcReset = false; }
            if (display.innerText === "0" || display.innerText === "Error") display.innerText = "";
            display.innerText += v;
        }

        function calcCmd(op) {
            playSfx('click');
            const display = document.getElementById('calc-display');
            if (display.innerText === "Error") return;
            calcReset = false;
            display.innerText += op;
        }

        function calcClear() {
            playSfx('click');
            document.getElementById('calc-display').innerText = "0";
            calcReset = false;
        }

        function calcPercent() {
            playSfx('click');
            const display = document.getElementById('calc-display');
            try {
                let val = eval(display.innerText.replace(/×/g, '*').replace(/÷/g, '/'));
                display.innerText = val / 100;
                calcReset = true;
            } catch (e) { display.innerText = "Error"; }
        }

        function calcSolve() {
            const display = document.getElementById('calc-display');
            try {
                let expression = display.innerText.replace(/×/g, '*').replace(/÷/g, '/');
                const openBrackets = (expression.match(/\(/g) || []).length;
                const closeBrackets = (expression.match(/\)/g) || []).length;
                for(let i=0; i < openBrackets - closeBrackets; i++) { expression += ")"; }
                let result = eval(expression);
                display.innerText = Number.isInteger(result) ? result : parseFloat(result.toFixed(4));
                playSfx('success');
                calcReset = true;
            } catch (e) { display.innerText = "Error"; playSfx('click'); }
        }

        async function clearAllData(){ if(confirm("Xoá sạch?")){ playSfx('click'); spendings=spendings.filter(s=>s.isSutra); await sync(); render(); }}
        async function deleteLine(d, i) { playSfx('click'); const s = spendings.find(x=>x.date===d); s.details.splice(i,1); s.cost=s.details.reduce((a,b)=>a+b.price,0n); await sync(); render(); }
        function applyAtmosphere(t) { playSfx('success'); const r = document.documentElement.style; if(t==='retro'){ r.setProperty('--accent','#ff00ff'); r.setProperty('--text','#39ff14'); } else { r.setProperty('--accent','#58a6ff'); r.setProperty('--text','#e6edf3'); } updateChart(); }
    </script>
</body>
