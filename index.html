<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendLog 624 Edition</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --green: #3fb950; --gold: #f2cc60; }
        body { background: var(--bg); color: #e6edf3; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        .nav-tabs { display: flex; position: sticky; top: 0; background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #30363d; z-index: 1000; }
        .nav-tab { flex: 1; padding: 18px; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; color: #8b949e; letter-spacing: 1px; }
        .nav-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .view { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
        .view.active { display: block; }
        
        /* Analytics Cards */
        .ana-toggle { display: flex; background: #161b22; border-radius: 8px; padding: 4px; margin-bottom: 20px; border: 1px solid #30363d; }
        .ana-btn { flex: 1; padding: 8px; border: none; background: transparent; color: #8b949e; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .ana-btn.active { background: #30363d; color: white; }
        .stat-focus { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #30363d; text-align: center; margin-bottom: 15px; }
        .stat-focus h1 { margin: 10px 0 0; font-size: 36px; color: var(--gold); }
        
        /* Receipt UI */
        .receipt { background: #fff; color: #111; padding: 15px; border-radius: 2px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-family: monospace; }
        .r-head { border-bottom: 1px dashed #aaa; text-align: center; padding-bottom: 8px; margin-bottom: 8px; font-weight: bold; }
        .r-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 13px; }
        .r-total { border-top: 1px solid #000; margin-top: 8px; padding-top: 5px; display: flex; justify-content: space-between; font-weight: 900; }

        input, textarea { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #30363d; color: var(--accent); border-radius: 8px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .total-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent); color: white; padding: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="showView('logs')">ENTRY</div>
        <div class="nav-tab" onclick="showView('stats')">ANALYTICS</div>
        <div class="nav-tab" onclick="showView('import')">BULK</div>
    </div>

    <div id="view-logs" class="view active">
        <div style="background:var(--card); padding:15px; border-radius:12px; border:1px solid #30363d">
            <input type="date" id="date-input">
            <input type="text" id="item-input" placeholder="Items (Water + Gas)">
            <input type="text" id="cost-input" placeholder="Prices (15k + 50k)">
            <button class="btn-save" onclick="saveEntry()">SAVE RECEIPT</button>
        </div>
        <div id="list" style="margin-top:20px"></div>
    </div>

    <div id="view-stats" class="view">
        <div class="ana-toggle">
            <button class="ana-btn active" onclick="setAna('daily')">DAILY AVG</button>
            <button class="ana-btn" onclick="setAna('weekly')">THIS WEEK</button>
            <button class="ana-btn" onclick="setAna('monthly')">THIS MONTH</button>
        </div>
        <div class="stat-focus">
            <small id="ana-label">Weekly Daily Avg</small>
            <h1 id="ana-value">0₫</h1>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div class="stat-focus" style="padding:15px"><small>Week Max</small><div id="stat-max" style="font-weight:bold; margin-top:5px">0₫</div></div>
            <div class="stat-focus" style="padding:15px"><small>Entries</small><div id="stat-count" style="font-weight:bold; margin-top:5px">0</div></div>
        </div>
    </div>

    <div id="view-import" class="view">
        <textarea id="bulk-input" rows="10" placeholder="(23/3 - 29/3)&#10;T2 : 31k (cà phê)"></textarea>
        <button class="btn-save" style="background:var(--green)" onclick="importData()">SYNC BULK</button>
    </div>

    <div class="total-footer">TOTAL: <span id="stat-grand-total">0</span>₫</div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        let spendings = [];
        let currentAna = 'daily';

        function showView(v){
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(e => e.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelector(`[onclick="showView('${v}')"]`).classList.add('active');
            render();
        }

        function setAna(t){ currentAna = t; document.querySelectorAll('.ana-btn').forEach(b => b.classList.remove('active')); document.querySelector(`[onclick="setAna('${t}')"]`).classList.add('active'); render(); }
        function format(n){ return new Intl.NumberFormat('vi-VN').format(Math.round(n)); }

        // Core Date Logic: Get Monday of the week for any date
        function getMonday(d) {
            d = new Date(d);
            const day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff)).setHours(0,0,0,0);
        }

        async function load(){
            const res = await fetch(API);
            spendings = await res.json() || [];
            render();
        }

        function render(){
            const now = new Date();
            const currentMonday = getMonday(new Date());
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            let grandTotal = 0, weeklySum = 0, monthlySum = 0, weekMax = 0;

            const sorted = [...spendings].sort((a,b) => new Date(b.date) - new Date(a.date));

            document.getElementById('list').innerHTML = sorted.map(s => {
                const entryDate = new Date(s.date);
                const entryMonday = getMonday(entryDate);
                
                grandTotal += s.cost;
                
                // Weekly Logic (Monday to Sunday)
                if(entryMonday === currentMonday) {
                    weeklySum += s.cost;
                    if(s.cost > weekMax) weekMax = s.cost;
                }
                
                // Monthly Logic
                if(entryDate.getMonth() === currentMonth && entryDate.getFullYear() === currentYear) {
                    monthlySum += s.cost;
                }

                return `
                <div class="receipt">
                    <div class="r-head">${s.date.split('-').reverse().join('/')}</div>
                    ${s.details.map(i => `<div class="r-row"><span>${i.name}</span><span>${format(i.price)}</span></div>`).join('')}
                    <div class="r-total"><span>TOTAL</span><span>${format(s.cost)}₫</span></div>
                </div>`;
            }).join('');

            if(currentAna === 'daily') {
                document.getElementById('ana-label').innerText = "This Week's Daily Avg";
                document.getElementById('ana-value').innerText = format(weeklySum / 7) + "₫";
            } else if(currentAna === 'weekly') {
                document.getElementById('ana-label').innerText = "Spent This Week (M-S)";
                document.getElementById('ana-value').innerText = format(weeklySum) + "₫";
            } else {
                document.getElementById('ana-label').innerText = "Spent This Month";
                document.getElementById('ana-value').innerText = format(monthlySum) + "₫";
            }

            document.getElementById('stat-grand-total').innerText = format(grandTotal);
            document.getElementById('stat-max').innerText = format(weekMax) + "₫";
            document.getElementById('stat-count').innerText = spendings.length;
        }

        async function saveEntry(){
            const d = document.getElementById('date-input').value;
            const names = document.getElementById('item-input').value.split('+');
            const prices = document.getElementById('cost-input').value.split('+').map(p => {
                let v = p.toLowerCase().replace(/k/g, '000').replace(/[^\d]/g, '');
                return parseFloat(v) || 0;
            });
            let entry = spendings.find(s => s.date === d);
            if(!entry){ entry = {date:d, cost:0, details:[]}; spendings.push(entry); }
            names.forEach((n, i) => entry.details.push({name:n.toUpperCase().trim(), price:prices[i]}));
            entry.cost = entry.details.reduce((a,b) => a + b.price, 0);
            await fetch(API, {method:"POST", body:JSON.stringify(spendings)});
            render();
            document.getElementById('item-input').value = ""; document.getElementById('cost-input').value = "";
        }

        async function importData(){
            const raw = document.getElementById('bulk-input').value;
            const lines = raw.split('\n');
            const header = lines.find(l => l.includes('/')) || "";
            const dayMap = { 'T2':0,'T3':1,'T4':2,'T5':3,'T6':4,'T7':5,'CN':6 };
            
            lines.forEach(line => {
                const dm = line.match(/^(T\d|CN)\s*:/i);
                if(!dm) return;
                const cd = dm[1].toUpperCase();
                const m = header.match(/(\d+)\/(\d+)/);
                const yr = header.match(/\b(20\d{2})\b/) ? header.match(/\b(20\d{2})\b/)[1] : 2026;
                let d = new Date(yr, m[2]-1, m[1]);
                d.setDate(d.getDate() + dayMap[cd]);
                const ds = d.toISOString().split('T')[0];

                const regex = /([\d.k]+)\s*\(([^)]+)\)/g;
                let match;
                while((match = regex.exec(line)) !== null){
                    const p = parseFloat(match[1].replace(/k/g, '000'));
                    const items = match[2].split(/[+/]/).map(n => n.trim());
                    let entry = spendings.find(s => s.date === ds);
                    if(!entry){ entry = {date:ds, cost:0, details:[]}; spendings.push(entry); }
                    items.forEach(it => entry.details.push({name:it.toUpperCase(), price: p/items.length}));
                    entry.cost = entry.details.reduce((a,b) => a+b.price, 0);
                }
            });
            await fetch(API, {method:"POST", body:JSON.stringify(spendings)});
            render(); showView('stats');
        }

        document.getElementById('date-input').valueAsDate = new Date();
        load();
    </script>
</body>
</html>
