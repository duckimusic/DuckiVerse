<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendLog 12.5 - Final Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style id="theme-style">
        :root { 
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff; 
            --green: #3fb950; --gold: #f2cc60; --danger: #f85149;
            --text: #e6edf3; --font: -apple-system, sans-serif;
            --border: 1px solid #30363d; --glow: none; --fx: none;
            --receipt-bg: #fff; --receipt-text: #111;
        }

        body { background: var(--bg); color: var(--text); font-family: var(--font); margin: 0; padding-bottom: 100px; transition: 0.5s; overflow-x: hidden; }
        
        #scanlines { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 9999; opacity: 0.12; display: var(--fx);
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        .nav-tabs { display: flex; position: sticky; top: 0; background: var(--card); border-bottom: var(--border); z-index: 1000; box-shadow: var(--glow); }
        .nav-tab { flex: 1; padding: 15px 5px; text-align: center; font-size: 10px; font-weight: 800; cursor: pointer; color: #8b949e; text-transform: uppercase; }
        .nav-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); text-shadow: var(--glow); }
        
        .view { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
        .view.active { display: block; }

        .receipt { background: var(--receipt-bg); color: var(--receipt-text); padding: 15px; border-radius: 2px; margin-bottom: 15px; font-family: monospace; box-shadow: var(--glow); border: var(--border); }
        .r-head { border-bottom: 1px dashed #aaa; text-align: center; padding-bottom: 8px; margin-bottom: 8px; font-weight: bold; }
        .r-row { display: flex; justify-content: space-between; align-items: center; margin: 5px 0; }
        .r-note { font-size: 10px; opacity: 0.7; font-style: italic; display: block; margin-top: -2px; }
        .r-total { border-top: 1px solid currentColor; margin-top: 8px; padding-top: 5px; display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; }
        .del-btn { color: var(--danger); font-weight: bold; cursor: pointer; padding-left: 10px; font-size: 18px; }

        .input-group { background: var(--card); padding: 15px; border-radius: 12px; border: var(--border); margin-bottom: 15px; box-shadow: var(--glow); }
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0; background: rgba(0,0,0,0.3); border: var(--border); color: var(--accent); border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: var(--border); border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; box-shadow: var(--glow); transition: 0.2s; }

        /* Calculator */
        #calc-toggle { position: fixed; right: 20px; bottom: 80px; background: var(--gold); color: #000; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        #calc-panel { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: #000; border-left: var(--border); z-index: 2001; transition: 0.4s; padding: 20px; box-sizing: border-box; }
        #calc-panel.open { right: 0; }
        .calc-screen { width: 100%; height: 70px; background: #111; color: var(--green); text-align: right; font-size: 28px; padding: 15px; box-sizing: border-box; border-radius: 4px; margin-bottom: 15px; border: var(--border); font-family: monospace; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { background: #222; color: #fff; padding: 18px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; font-size: 18px; border: 1px solid #333; }
        .calc-btn.active { background: var(--accent); }

        .chart-container { background: var(--card); border-radius: 12px; padding: 15px; border: var(--border); height: 250px; margin-bottom: 15px; }
        .total-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent); color: white; padding: 15px; text-align: center; font-weight: bold; z-index: 100; font-size: 18px; box-shadow: var(--glow); }
    </style>
</head>
<body>

    <div id="scanlines"></div>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="showView('daily')">Logs</div>
        <div class="nav-tab" onclick="showView('analytics')">Graphs</div>
        <div class="nav-tab" onclick="showView('bills')">Bills</div>
        <div class="nav-tab" onclick="showView('tools')">Settings</div>
    </div>

    <div id="view-daily" class="view active">
        <div class="input-group">
            <input type="date" id="date-input">
            <input type="text" id="item-input" placeholder="Tên (Xăng + Thuốc)">
            <input type="text" id="cost-input" placeholder="Giá (50k + 26k)">
            <input type="text" id="note-input" placeholder="Ghi chú (Tùy chọn)">
            <button class="btn" onclick="saveEntry()">SAVE RECEIPT</button>
        </div>
        <div id="daily-list"></div>
    </div>

    <div id="view-analytics" class="view">
        <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px;">
            <button class="btn" style="flex: 1; padding: 8px; font-size: 10px; margin: 0;" onclick="updateChart('14d')">LATEST</button>
            <button class="btn" style="flex: 1; padding: 8px; font-size: 10px; margin: 0; background: var(--gold); color:#000" onclick="updateChart('year')">YEAR</button>
            <select id="month-picker" onchange="updateChart('month')" style="flex: 2; margin: 0; height: 35px; font-size: 12px;">
                <option value="0">January</option> <option value="1">February</option> <option value="2" selected>March</option>
                <option value="3">April</option> <option value="4">May</option> <option value="5">June</option>
                <option value="6">July</option> <option value="7">August</option> <option value="8">September</option>
                <option value="9">October</option> <option value="10">November</option> <option value="11">December</option>
            </select>
        </div>
        <div class="chart-container"><canvas id="spendingChart"></canvas></div>
        <div id="stats-summary" style="background: var(--card); padding: 15px; border-radius: 12px; border: var(--border); font-size: 13px;"></div>
    </div>

    <div id="view-bills" class="view">
        <div class="input-group">
            <input type="text" id="bill-name" placeholder="Bill Name">
            <input type="text" id="bill-amount" placeholder="Amount (e.g. 500k)">
            <button class="btn" style="background:var(--danger)" onclick="addBill()">ADD BILL</button>
        </div>
        <div id="bill-list"></div>
    </div>

    <div id="view-tools" class="view">
        <div class="input-group">
            <label style="font-size: 10px; color: #8b949e;">ATMOSPHERE OVERRIDE</label>
            <select onchange="applyAtmosphere(this.value)">
                <option value="default">Default Matrix</option>
                <option value="retro">80s Retro (Scanlines)</option>
                <option value="cyber">Cyberpunk (Neon)</option>
                <option value="steam">Steampunk (Brass)</option>
                <option value="horror">Uncanny (Backrooms)</option>
            </select>
        </div>
        <button class="btn" style="background:var(--green)" onclick="importData()">SYNC BULK REPORT</button>
        <textarea id="bulk-input" rows="3" placeholder="Paste bulk report here..."></textarea>
        <button class="btn" style="background:transparent; border:1px solid var(--danger); color:var(--danger); margin-top:40px" onclick="clearAllData()">WIPE ALL DATA</button>
    </div>

    <div id="calc-toggle" onclick="toggleCalc()">±</div>
    <div id="calc-panel">
        <div class="calc-screen" id="calc-display">0</div>
        <div class="calc-grid">
            <div class="calc-btn" data-key="7" onclick="calcInput('7')">7</div><div class="calc-btn" data-key="8" onclick="calcInput('8')">8</div><div class="calc-btn" data-key="9" onclick="calcInput('9')">9</div><div class="calc-btn" data-key="/" onclick="calcCmd('/')">÷</div>
            <div class="calc-btn" data-key="4" onclick="calcInput('4')">4</div><div class="calc-btn" data-key="5" onclick="calcInput('5')">5</div><div class="calc-btn" data-key="6" onclick="calcInput('6')">6</div><div class="calc-btn" data-key="*" onclick="calcCmd('*')">×</div>
            <div class="calc-btn" data-key="1" onclick="calcInput('1')">1</div><div class="calc-btn" data-key="2" onclick="calcInput('2')">2</div><div class="calc-btn" data-key="3" onclick="calcInput('3')">3</div><div class="calc-btn" data-key="-" onclick="calcCmd('-')">-</div>
            <div class="calc-btn" data-key="0" onclick="calcInput('0')">0</div><div class="calc-btn" data-key="Backspace" onclick="calcClear()">C</div><div class="calc-btn" data-key="Enter" onclick="calcSolve()">=</div><div class="calc-btn" data-key="+" onclick="calcCmd('+')">+</div>
        </div>
        <button class="btn" style="margin-top:20px" onclick="toggleCalc()">CLOSE</button>
    </div>

    <div class="total-footer">TOTAL: <span id="grand-total-val">0k</span></div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        let spendings = [];
        let bills = JSON.parse(localStorage.getItem('spendlog_bills')) || [];
        let myChart = null;

        function formatK(n) {
            let val = Math.floor(Number(n)/1000);
            return val === 0 ? "0k" : new Intl.NumberFormat('en-US').format(val) + "k";
        }

        function toBigInt(val) {
            if (!val) return 0n;
            let clean = String(val).toLowerCase().replace(/k/g, '000').replace(/[^\d]/g, '');
            return BigInt(clean || 0);
        }

        async function sync() {
            const storageData = spendings.map(s => ({
                ...s, cost: s.cost.toString(),
                details: s.details.map(d => ({ ...d, price: d.price.toString() }))
            }));
            await fetch(API, {method:"POST", body:JSON.stringify(storageData)});
            localStorage.setItem('spendlog_bills', JSON.stringify(bills));
        }

        async function load() {
            const res = await fetch(API);
            const data = await res.json() || [];
            spendings = data.map(s => ({
                ...s, cost: BigInt(s.cost || 0),
                details: s.details.map(d => ({ ...d, price: BigInt(d.price || 0), note: d.note || "" }))
            }));
            render();
        }

        function render() {
            let grandTotal = 0n;
            const sorted = [...spendings].sort((a,b) => new Date(b.date) - new Date(a.date));
            document.getElementById('daily-list').innerHTML = sorted.map(s => {
                grandTotal += s.cost;
                const [y, m, d] = s.date.split('-');
                const dayName = new Date(y, m-1, d).toLocaleDateString('en-US', {weekday:'short'});
                return `
                <div class="receipt">
                    <div class="r-head">${dayName} ${d}/${m}/${y}</div>
                    ${s.details.map((item, idx) => `
                        <div class="r-row">
                            <div><b>${item.name}</b>${item.note ? `<span class="r-note">${item.note}</span>` : ''}</div>
                            <span>${formatK(item.price)} <span class="del-btn" onclick="deleteLine('${s.date}', ${idx})">×</span></span>
                        </div>`).join('')}
                    <div class="r-total"><span>TOTAL</span><span>${formatK(s.cost)}</span></div>
                </div>`;
            }).join('');
            document.getElementById('bill-list').innerHTML = bills.map((b, i) => `<div class="receipt" style="background:var(--card); color:var(--text); border-left: 4px solid var(--danger)"><div class="r-row"><span>${b.name}</span><b>${b.amount} <span onclick="deleteBill(${i})" style="cursor:pointer; margin-left:10px">×</span></b></div></div>`).join('');
            document.getElementById('grand-total-val').innerText = formatK(grandTotal);
            updateChart('14d');
        }

        function updateChart(range = '14d') {
            const ctx = document.getElementById('spendingChart').getContext('2d');
            const allSorted = [...spendings].sort((a, b) => new Date(a.date) - new Date(b.date));
            let labels = [], data = [], labelText = "";

            if (range === '14d') {
                const slice = allSorted.slice(-14);
                labels = slice.map(s => s.date.split('-').reverse().slice(0, 2).join('/'));
                data = slice.map(s => Number(s.cost) / 1000);
                labelText = "Last 14 Records";
            } 
            else if (range === 'month') {
                const selectedMonth = parseInt(document.getElementById('month-picker').value);
                const currentYear = new Date().getFullYear();
                const filtered = allSorted.filter(s => {
                    const d = new Date(s.date);
                    return d.getMonth() === selectedMonth && d.getFullYear() === currentYear;
                });
                const daysInMonth = new Date(currentYear, selectedMonth + 1, 0).getDate();
                labels = Array.from({length: daysInMonth}, (_, i) => (i + 1).toString());
                data = new Array(daysInMonth).fill(0);
                filtered.forEach(s => {
                    const dayNum = parseInt(s.date.split('-')[2]);
                    data[dayNum - 1] += Number(s.cost) / 1000;
                });
                const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                labelText = monthNames[selectedMonth] + " Trend";
            } 
            else if (range === 'year') {
                data = new Array(12).fill(0);
                allSorted.forEach(s => { if (new Date(s.date).getFullYear() === new Date().getFullYear()) data[new Date(s.date).getMonth()] += Number(s.cost) / 1000; });
                labels = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                labelText = "Yearly View";
            }

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: labelText, data, borderColor: '#58a6ff', tension: 0.2, fill: true, backgroundColor: 'rgba(88, 166, 255, 0.1)' }]},
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#333' } }, x: { grid: { display: false } } } }
            });
            const sum = data.reduce((a, b) => a + b, 0);
            document.getElementById('stats-summary').innerHTML = `Total: <b style="color:var(--accent)">${new Intl.NumberFormat().format(sum)}k</b> | Avg: <b>${data.filter(v => v > 0).length ? (sum / data.filter(v => v > 0).length).toFixed(1) : 0}k</b>`;
        }

        async function saveEntry() {
            const d = document.getElementById('date-input').value;
            if(!d) return;
            const names = document.getElementById('item-input').value.split('+');
            const costs = document.getElementById('cost-input').value.split('+');
            const note = document.getElementById('note-input').value;
            let entry = spendings.find(s => s.date === d);
            if(!entry) { entry = {date:d, cost:0n, details:[]}; spendings.push(entry); }
            names.forEach((n, i) => entry.details.push({name:n.toUpperCase().trim(), price:toBigInt(costs[i]), note}));
            entry.cost = entry.details.reduce((acc, curr) => acc + curr.price, 0n);
            await sync(); render();
            document.getElementById('item-input').value = ""; document.getElementById('cost-input').value = ""; document.getElementById('note-input').value = "";
        }

        function applyAtmosphere(t) {
            const r = document.documentElement.style;
            const fx = document.getElementById('scanlines');
            fx.style.setProperty('--fx', t === 'retro' ? 'block' : 'none');
            r.setProperty('--font', 'sans-serif'); r.setProperty('--glow', 'none'); r.setProperty('--filter', 'none'); r.setProperty('--receipt-bg', '#fff'); r.setProperty('--receipt-text', '#111');
            if(t==='retro'){ r.setProperty('--bg','#2b033d'); r.setProperty('--accent','#ff00ff'); r.setProperty('--text','#39ff14'); r.setProperty('--font','monospace'); r.setProperty('--border','2px solid #ff00ff'); r.setProperty('--glow','0 0 10px #ff00ff'); }
            if(t==='cyber'){ r.setProperty('--bg','#000'); r.setProperty('--accent','#00f3ff'); r.setProperty('--text','#f0f'); r.setProperty('--border','1px solid #00f3ff'); r.setProperty('--glow','0 0 15px #00f3ff'); }
            if(t==='steam'){ r.setProperty('--bg','#2c1e16'); r.setProperty('--accent','#d4af37'); r.setProperty('--receipt-bg','#d2b48c'); r.setProperty('--font','serif'); }
            if(t==='horror'){ r.setProperty('--bg','#1a1a10'); r.setProperty('--filter','sepia(0.6) contrast(1.2)'); r.setProperty('--font','monospace'); }
        }

        let calcVal = "";
        function toggleCalc() { document.getElementById('calc-panel').classList.toggle('open'); }
        function calcInput(v) { calcVal += v; updateCalc(); }
        function calcCmd(c) { calcVal += " " + c + " "; updateCalc(); }
        function calcClear() { calcVal = ""; updateCalc(); }
        function updateCalc() { document.getElementById('calc-display').innerText = calcVal || "0"; }
        function calcSolve() { try { calcVal = eval(calcVal).toString(); updateCalc(); } catch(e) { calcVal = "Error"; } }
        window.addEventListener('keydown', e => {
            if(!document.getElementById('calc-panel').classList.contains('open')) return;
            if(/[0-9]/.test(e.key)) calcInput(e.key);
            else if(['+','-','*','/'].includes(e.key)) calcCmd(e.key);
            else if(e.key==='Enter'){ e.preventDefault(); calcSolve(); }
            else if(e.key==='Backspace'||e.key==='Escape') calcClear();
        });

        function addBill() { const n = document.getElementById('bill-name').value, a = document.getElementById('bill-amount').value; if(n&&a){ bills.push({name:n, amount:a}); render(); sync(); } }
        function deleteBill(i) { bills.splice(i,1); render(); sync(); }
        async function deleteLine(d, i) { const s = spendings.find(x=>x.date===d); if(s){ s.details.splice(i,1); s.cost=s.details.reduce((a,b)=>a+b.price,0n); if(!s.details.length) spendings=spendings.filter(x=>x.date!==d); await sync(); render(); }}
        async function clearAllData(){ if(confirm("Wipe all?")){ spendings=[]; await sync(); render(); }}
        function showView(v){ document.querySelectorAll('.view').forEach(e=>e.classList.remove('active')); document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active')); document.getElementById(`view-${v}`).classList.add('active'); document.querySelector(`[onclick="showView('${v}')"]`).classList.add('active'); }
        
        document.getElementById('date-input').value = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Ho_Chi_Minh"})).toISOString().split('T')[0];
        load();
    </script>
</body>
</html>
