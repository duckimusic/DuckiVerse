<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIS 2.0 - Zen & Discipline</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --card: #111418; --accent: #f2cc60; 
            --text: #e6edf3; --subtext: #8b949e; --border: 1px solid #30363d;
            --danger: #f85149; --success: #3fb950;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        /* SPLASH SCREEN */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #05070a; display: flex; align-items: center; justify-content: center;
            z-index: 99999; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-content { text-align: center; }
        .zen-ring {
            width: 80px; height: 80px; border: 2px solid var(--accent);
            border-radius: 50%; border-top-color: transparent;
            margin: 0 auto 20px; animation: spin-anim 1.5s linear infinite;
        }
        @keyframes spin-anim { to { transform: rotate(360deg); } }
        .splash-hidden { opacity: 0; visibility: hidden; }

        /* NAVIGATION */
        .nav-bar { display: flex; position: sticky; top: 0; background: rgba(17, 20, 24, 0.95); backdrop-filter: blur(10px); border-bottom: var(--border); z-index: 1000; }
        .nav-item { flex: 1; padding: 18px 0; text-align: center; font-size: 10px; font-weight: 800; cursor: pointer; color: var(--subtext); text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .view { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }

        /* COMPONENTS */
        .card { background: var(--card); border: var(--border); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .btn-filter { background: #1c2128; border: var(--border); color: var(--subtext); padding: 6px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; margin-right: 5px; }
        .btn-filter.active { background: var(--accent); color: #000; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: var(--accent); border-radius: 10px; box-sizing: border-box; }
        
        .btn-gold { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* CONFIRM POPUP */
        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .popup-box { background: #1c2128; border: 1px solid var(--accent); padding: 30px; border-radius: 25px; text-align: center; width: 80%; }

        /* WHEEL CORRECTED */
        .wheel-wrap { position: relative; width: 320px; height: 320px; margin: 25px auto; }
        #wheel-canvas { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1); }
        #pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid var(--accent); z-index: 10; }
        .wheel-hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: var(--accent); border-radius: 50%; border: 4px solid var(--bg); z-index: 5; }

        .receipt { background: #fff; color: #000; padding: 15px; border-radius: 2px; margin-bottom: 15px; font-family: monospace; border-bottom: 4px solid #999; }
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--accent); color: #000; padding: 18px; text-align: center; font-weight: 900; font-size: 20px; z-index: 900; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-content">
            <div class="zen-ring"></div>
            <h2 style="letter-spacing: 5px; color: #fff; margin: 0;">HIS 2.0</h2>
            <p style="font-size: 10px; color: var(--subtext); text-transform: uppercase;">Zen Financial Engine</p>
        </div>
    </div>

    <div id="popup-overlay">
        <div class="popup-box">
            <p id="popup-msg" style="line-height: 1.6; margin-bottom: 25px; font-weight: bold;"></p>
            <div style="display: flex; gap: 10px;">
                <button onclick="confirmAction(true)" style="flex:1; padding:15px; background:var(--success); border:none; border-radius:12px; color:#fff; font-weight:900;">ĐÚNG</button>
                <button onclick="confirmAction(false)" style="flex:1; padding:15px; background:var(--danger); border:none; border-radius:12px; color:#fff; font-weight:900;">HỦY</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('home')">Home</div>
        <div class="nav-item" onclick="nav('lost')">L.O.S.T</div>
        <div class="nav-item" onclick="nav('zen')">Eightfold</div>
        <div class="nav-item" onclick="nav('set')">Settings</div>
    </div>

    <div id="view-home" class="view active">
        <div style="margin-bottom: 15px; display: flex; justify-content: center;">
            <button class="btn-filter active" onclick="updateChart('week', this)">Tuần</button>
            <button class="btn-filter" onclick="updateChart('month', this)">Tháng</button>
            <button class="btn-filter" onclick="updateChart('year', this)">Năm</button>
        </div>
        <div class="card" style="height: 250px;"><canvas id="mainChart"></canvas></div>
        <select id="home-month-filter" onchange="load()"><option value="all">Tất cả dữ liệu</option></select>
    </div>

    <div id="view-lost" class="view">
        <div class="card">
            <input type="date" id="in-date">
            <input type="text" id="in-name" placeholder="Món đồ/Dịch vụ...">
            <input type="number" id="in-price" placeholder="Giá tiền (k)">
            <textarea id="in-note" placeholder="Note Chánh niệm..."></textarea>
            <button class="btn-gold" onclick="preSave()">SAVE RECEIPT</button>
        </div>
        <div id="lost-history"></div>
    </div>

    <div id="view-zen" class="view">
        <div class="card" style="text-align: center; border: 1px dashed var(--accent);">
            <div style="font-size: 10px; color: var(--accent); margin-bottom: 5px;">DHAMMA ENGINE</div>
            <div style="color: var(--subtext); font-style: italic;">"WORK IN PROGRESS... COMING SOON"</div>
        </div>
        <div id="zen-res" style="text-align: center; font-weight: 900; color: var(--accent); height: 40px; font-size: 24px;">HÔM NAY TU TẬP</div>
        <div class="wheel-wrap">
            <div id="pointer"></div>
            <div class="wheel-hub"></div>
            <canvas id="wheel-canvas" width="800" height="800"></canvas>
        </div>
        <button class="btn-gold" onclick="spin()">XOAY BÁT CHÁNH ĐẠO</button>
    </div>

    <div id="view-set" class="view">
        <div class="card">
            <input type="date" id="st-date"> đến <input type="date" id="ed-date">
            <button class="btn-gold" onclick="exportData()">XUẤT PDF HÓA ĐƠN</button>
        </div>
        <button class="btn-gold" style="background:transparent; border:1px solid var(--danger); color:var(--danger)" onclick="reset()">RESET ALL DATA</button>
    </div>

    <div class="footer">TOTAL: <span id="total-val">0k</span></div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        const PATHS = ["Chánh Kiến", "Chánh Tư Duy", "Chánh Ngữ", "Chánh Nghiệp", "Chánh Mạng", "Chánh Tinh Tấn", "Chánh Niệm", "Chánh Định"];
        let logs = [], chart = null, temp = null, wheelAngle = 0;

        window.onload = () => {
            document.getElementById('in-date').value = new Date().toISOString().split('T')[0];
            drawWheel();
            load();
            setTimeout(() => document.getElementById('splash').classList.add('splash-hidden'), 2500);
        };

        async function load() {
            const res = await fetch(API);
            const data = await res.json() || [];
            logs = data.map(s => ({ ...s, cost: BigInt(s.cost), details: s.details.map(d => ({ ...d, price: BigInt(d.price) })) }));
            render();
        }

        function render() {
            renderHistory();
            updateChart('week');
            const total = logs.reduce((a, b) => a + b.cost, 0n);
            document.getElementById('total-val').innerText = (Number(total)/1000).toLocaleString() + "k";
        }

        function updateChart(mode, btn) {
            if(btn) { document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            let labels = [], values = [];
            const sorted = [...logs].sort((a,b) => a.date.localeCompare(b.date));
            if(mode === 'week') { labels = sorted.slice(-7).map(x => x.date.split('-')[2]); values = sorted.slice(-7).map(x => Number(x.cost)/1000); }
            else if(mode === 'month') { const now = new Date().toISOString().slice(0, 7); const m = sorted.filter(x => x.date.startsWith(now)); labels = m.map(x => x.date.split('-')[2]); values = m.map(x => Number(x.cost)/1000); }
            else { labels = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; values = new Array(12).fill(0); sorted.forEach(l => values[parseInt(l.date.split('-')[1])-1] += Number(l.cost)/1000); }
            chart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ data: values, borderColor: '#f2cc60', backgroundColor: 'rgba(242,204,96,0.1)', fill: true, tension: 0.4 }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }

        function preSave() {
            const n = document.getElementById('in-name').value, p = document.getElementById('in-price').value;
            if(!n || !p) return;
            temp = { date: document.getElementById('in-date').value, name: n.toUpperCase(), price: BigInt(p)*1000n, note: document.getElementById('in-note').value };
            document.getElementById('popup-msg').innerText = `Xác nhận chi ${p}k cho "${n}"?`;
            document.getElementById('popup-overlay').style.display = 'flex';
        }

        async function confirmAction(yes) {
            document.getElementById('popup-overlay').style.display = 'none';
            if(yes && temp) {
                let s = logs.find(x => x.date === temp.date);
                if(!s) { s = { date: temp.date, cost: 0n, details: [] }; logs.push(s); }
                s.details.push({ name: temp.name, price: temp.price, note: temp.note });
                s.cost = s.details.reduce((a,b) => a+b.price, 0n);
                const out = logs.map(s => ({ ...s, cost: s.cost.toString(), details: s.details.map(d => ({ ...d, price: d.price.toString() })) }));
                await fetch(API, {method: "POST", body: JSON.stringify(out)});
                load();
                document.getElementById('in-name').value = ""; document.getElementById('in-price').value = "";
            }
        }

        function renderHistory() {
            const hist = document.getElementById('lost-history');
            const sorted = [...logs].sort((a,b) => b.date.localeCompare(a.date));
            hist.innerHTML = sorted.map(s => `
                <div class="receipt">
                    <div style="text-align:center;border-bottom:1px dashed #000;margin-bottom:10px;font-weight:900;">${s.date}</div>
                    ${s.details.map((d, i) => `<div style="display:flex;justify-content:space-between;margin:5px 0"><span>${d.name} ${d.note ? `<br><small style="color:gray">* ${d.note}</small>` : ''}</span><b>${Number(d.price)/1000}k <span style="color:red" onclick="del('${s.date}',${i})">×</span></b></div>`).join('')}
                    <div style="text-align:right;font-weight:900;margin-top:10px;border-top:1px solid #000">TOTAL: ${Number(s.cost)/1000}k</div>
                </div>
            `).join('');
        }

        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const arc = (Math.PI * 2) / 8;
            ctx.clearRect(0, 0, 800, 800);
            for(let i=0; i<8; i++) {
                const angle = i * arc;
                ctx.beginPath(); ctx.fillStyle = i%2 ? "#161b22" : "#0d1117";
                ctx.moveTo(400, 400); ctx.arc(400, 400, 380, angle, angle + arc); ctx.fill();
                ctx.save(); ctx.translate(400, 400); ctx.rotate(angle + arc/2);
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillStyle = i%2 ? "#fff" : "#f2cc60";
                const w = PATHS[i].split(' ');
                ctx.font = "bold 44px sans-serif";
                if(w.length > 1) { ctx.fillText(w[0], 260, -25); ctx.font = "34px sans-serif"; ctx.fillText(w[1], 260, 30); }
                else { ctx.fillText(PATHS[i], 260, 0); }
                ctx.restore();
            }
        }

        function spin() {
            const extraSpin = Math.floor(Math.random() * 360) + 3600;
            wheelAngle += extraSpin;
            document.getElementById('wheel-canvas').style.transform = `rotate(${wheelAngle}deg)`; // Quay xuôi chiều kim đồng hồ
            document.getElementById('zen-res').innerText = "ĐANG QUÁN CHIẾU...";
            setTimeout(() => {
                const actualDegree = wheelAngle % 360;
                // Kim ở đỉnh = 270 độ. Công thức tính nan tại vị trí 270:
                const index = Math.floor(((270 - actualDegree + 360) % 360) / 45);
                document.getElementById('zen-res').innerText = PATHS[index].toUpperCase();
            }, 5000);
        }

        function nav(v) { document.querySelectorAll('.view').forEach(x => x.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); document.getElementById('view-'+v).classList.add('active'); event.currentTarget.classList.add('active'); }
        async function del(d, i) { const e = logs.find(x=>x.date===d); e.details.splice(i,1); e.cost=e.details.reduce((a,b)=>a+b.price,0n); if(!e.details.length) logs=logs.filter(x=>x.date!==d); const out = logs.map(s => ({ ...s, cost: s.cost.toString(), details: s.details.map(d => ({ ...d, price: d.price.toString() })) })); await fetch(API, {method: "POST", body: JSON.stringify(out)}); load(); }
        function exportData() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text("HIS REPORT", 10, 10); doc.save("HIS.pdf"); }
        async function reset() { if(confirm("Xóa hết?")) { await fetch(API, {method: "POST", body: JSON.stringify([])}); load(); } }
    </script>
</body>
</html>
