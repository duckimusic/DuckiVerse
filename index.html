<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SpendLog</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --danger: #f85149; --warning: #f1e05a; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; margin: 0; display: flex; justify-content: center; }
        .app { max-width: 400px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .input-group { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-main { background: var(--accent); color: white; margin-top: 10px; }
        .btn-import-toggle { background: transparent; color: var(--warning); border: 1px solid var(--warning); margin-bottom: 15px; font-size: 13px; padding: 5px; width: auto; }
        .entry { background: var(--card); border: 1px solid #30363d; padding: 15px; border-radius: 12px; margin-bottom: 12px; animation: fadeIn 0.3s ease; }
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
        .btn-s { background: #30363d; color: var(--text); font-size: 12px; padding: 8px; }
        .btn-del { background: transparent; border: 1px solid var(--danger); color: var(--danger); font-size: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h2>Weekly Spending</h2>
            <small id="status" style="color: gray;">Synced</small>
        </div>
        
        <div class="input-group">
            <input type="date" id="date-input">
            <input type="text" id="item-input" placeholder="Tên (VD: Nước ngọt)">
            <input type="text" id="cost-input" placeholder="Số tiền (VD: 15000)">
            <button class="btn-main" onclick="saveEntry()">Lưu Chi Tiêu</button>
        </div>

        <div style="text-align: right;">
            <button class="btn-import-toggle" onclick="document.getElementById('bulk-section').style.display='block'">+ Nhập dữ liệu cũ</button>
        </div>

        <div id="bulk-section" class="input-group" style="display:none; border-color: var(--warning);">
            <small style="color: var(--warning);">Định dạng: YYYY-MM-DD | Tên | Số tiền</small>
            <textarea id="bulk-input" rows="5" placeholder="2026-03-24 | Đổ xăng | 90000"></textarea>
            <button class="btn-s" style="background:var(--warning); color:black;" onclick="importData()">Xác Nhận Import</button>
            <button class="btn-s" style="margin-top:5px;" onclick="document.getElementById('bulk-section').style.display='none'">Đóng</button>
        </div>

        <div id="list">Loading...</div>
    </div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        let spendings = [];

        document.getElementById('date-input').valueAsDate = new Date();

        function getDayVn(dateString) {
            const days = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
            const d = new Date(dateString);
            return days[d.getDay()];
        }

        async function loadData() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                spendings = Array.isArray(data) ? data : [];
                render();
            } catch (e) {
                document.getElementById('list').innerText = "Lỗi kết nối Cloudflare";
            }
        }

        function evalCost(str) {
            try { return Function(`'use strict'; return (${str.replace(/[^-+*/\d.]/g, '')})`)(); }
            catch { return 0; }
        }

        async function saveEntry() {
            const date = document.getElementById('date-input').value;
            const itemName = document.getElementById('item-input').value || "Chi tiêu";
            const costStr = document.getElementById('cost-input').value;
            
            if (!date || !costStr) return alert("Vui lòng nhập ngày và số tiền");

            const status = document.getElementById('status');
            status.innerText = "Saving...";

            const costValue = evalCost(costStr);
            const index = spendings.findIndex(s => s.date === date);
            
            if (index > -1) {
                if (!spendings[index].details) {
                    spendings[index].details = [{ name: spendings[index].item, price: spendings[index].cost }];
                }
                spendings[index].details.push({ name: itemName, price: costValue });
                spendings[index].cost = spendings[index].details.reduce((sum, item) => sum + item.price, 0);
            } else {
                spendings.push({ date, cost: costValue, details: [{ name: itemName, price: costValue }] });
            }

            render();
            await sync();
            status.innerText = "Synced";
            document.getElementById('cost-input').value = "";
            document.getElementById('item-input').value = "";
        }

        async function importData() {
            const raw = document.getElementById('bulk-input').value;
            const lines = raw.split('\n');
            lines.forEach(line => {
                if (!line.trim()) return;
                const [date, item, cost] = line.split('|').map(s => s.trim());
                if (date && cost) {
                    const costVal = evalCost(cost);
                    const idx = spendings.findIndex(s => s.date === date);
                    if (idx > -1) {
                        if (!spendings[idx].details) spendings[idx].details = [{ name: spendings[idx].item, price: spendings[idx].cost }];
                        spendings[idx].details.push({ name: item, price: costVal });
                        spendings[idx].cost = spendings[idx].details.reduce((sum, itm) => sum + itm.price, 0);
                    } else {
                        spendings.push({ date, cost: costVal, details: [{ name: item, price: costVal }] });
                    }
                }
            });
            render();
            await sync();
            document.getElementById('bulk-section').style.display = 'none';
        }

        async function sync() {
            await fetch(API, { method: "POST", body: JSON.stringify(spendings) });
        }

        function render() {
            const container = document.getElementById('list');
            if (spendings.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:gray;'>Chưa có dữ liệu.</p>";
                return;
            }

            container.innerHTML = spendings.sort((a,b) => new Date(b.date) - new Date(a.date)).map((s, i) => {
                const dayVn = getDayVn(s.date);
                const formattedDate = new Date(s.date).toLocaleDateString('vi-VN');
                const totalCost = new Intl.NumberFormat('vi-VN').format(s.cost) + "vn₫";
                const itemsHtml = (s.details || [{name: s.item, price: s.cost}]).map(item => `
                    <div style="display:flex; justify-content:space-between; font-size: 0.9rem; margin-top: 4px; color: #8b949e;">
                        <span>- ${item.name}</span>
                        <span>(${new Intl.NumberFormat('vi-VN').format(item.price)}vn₫)</span>
                    </div>
                `).join('');

                return `
                    <div class="entry">
                        <strong style="color:var(--accent);">${dayVn} (${formattedDate})</strong>
                        <div style="margin: 8px 0; border-bottom: 1px dashed #30363d; padding-bottom: 8px;">
                            ${itemsHtml}
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items: center;">
                            <span style="font-weight:bold; color:white;">Total:</span>
                            <strong style="font-size: 1.2rem; color: var(--warning);">${totalCost}</strong>
                        </div>
                        <div class="actions">
                            <button class="btn-s" onclick="copyItem(${i})">Copy</button>
                            <button class="btn-s" onclick="editItem(${i})">Sửa</button>
                            <button class="btn-del" onclick="deleteItem(${i})">Xóa</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function copyItem(i) {
            const s = spendings[i];
            const itemsText = (s.details || []).map(item => `- ${item.name} (${item.price}vn₫)`).join('\n');
            const text = `${getDayVn(s.date)} (${new Date(s.date).toLocaleDateString('vi-VN')})\n${itemsText}\nTotal: ${new Intl.NumberFormat('vi-VN').format(s.cost)}vn₫`;
            navigator.clipboard.writeText(text);
            alert("Đã copy checklist!");
        }

        function editItem(i) {
            const s = spendings[i];
            document.getElementById('date-input').value = s.date;
            alert("Bạn có thể thêm món mới vào ngày này!");
        }

        async function deleteItem(i) {
            if(confirm("Xóa toàn bộ ngày này?")) {
                spendings.splice(i, 1); 
                render();
                await sync();
            }
        }

        loadData();
    </script>
</body>
</html>
