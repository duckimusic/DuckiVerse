<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendLog 12.8.5 - Final Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style id="theme-style">
        :root { 
            --bg: #0d1117; --card: rgba(13, 17, 23, 0.8); --accent: #58a6ff; 
            --green: #3fb950; --gold: #f2cc60; --danger: #f85149;
            --text: #e6edf3; --font: -apple-system, sans-serif;
            --border: 1px solid rgba(255,255,255,0.1); --glow: none; --fx: none;
            --receipt-bg: #fff; --receipt-text: #111; --bg-img: none;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1117; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo {
            width: 80px; height: 80px; border: 4px solid var(--accent);
            border-radius: 20%; position: relative; animation: pulse 2s infinite ease-in-out;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 32px; color: var(--accent);
        }
        .splash-bar {
            width: 150px; height: 2px; background: rgba(255,255,255,0.1);
            margin-top: 30px; position: relative; overflow: hidden;
        }
        .splash-progress {
            width: 0%; height: 100%; background: var(--accent);
            position: absolute; left: 0; top: 0; animation: load 2s forwards cubic-bezier(0.42, 0, 0.58, 1);
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        .hide-splash { opacity: 0; visibility: hidden; }

        /* --- MAIN UI --- */
        body { 
            background: var(--bg); background-image: var(--bg-img);
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); font-family: var(--font); margin: 0; padding-bottom: 100px; 
            transition: 0.8s ease; overflow-x: hidden; 
        }
        
        #scanlines { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 9999; opacity: 0.15; display: var(--fx);
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            background-size: 100% 3px, 3px 100%;
        }

        .nav-tabs { 
            display: flex; position: sticky; top: 0; background: var(--card); 
            border-bottom: var(--border); z-index: 1000; backdrop-filter: blur(15px);
        }
        .nav-tab { flex: 1; padding: 15px 5px; text-align: center; font-size: 10px; font-weight: 800; cursor: pointer; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .nav-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        .view { display: none; padding: 20px; max-width: 500px; margin: 0 auto; filter: var(--filter, none); }
        .view.active { display: block; }

        .receipt { 
            background: var(--receipt-bg); color: var(--receipt-text); padding: 18px; border-radius: 2px; 
            margin-bottom: 15px; font-family: monospace; box-shadow: var(--glow, 0 10px 30px rgba(0,0,0,0.5)); 
            border: var(--border); transform: var(--receipt-tilt, none); transition: 0.4s;
        }
        .r-head { border-bottom: 1px dashed rgba(0,0,0,0.2); text-align: center; padding-bottom: 8px; margin-bottom: 8px; font-weight: bold; }
        .r-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
        .r-total { border-top: 1px solid currentColor; margin-top: 8px; padding-top: 6px; display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; }
        .del-btn { color: var(--danger); font-weight: bold; cursor: pointer; padding-left: 12px; }

        .input-group { 
            background: var(--card); padding: 20px; border-radius: 12px; border: var(--border); 
            margin-bottom: 15px; backdrop-filter: blur(12px);
        }
        input, textarea, select { width: 100%; padding: 12px; margin: 6px 0; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: var(--accent); border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 6px; text-transform: uppercase; }

        #calc-toggle { position: fixed; right: 20px; bottom: 85px; background: var(--gold); color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 2000; box-shadow: 0 5px 20px rgba(0,0,0,0.6); }
        #calc-panel { position: fixed; right: -320px; top: 0; width: 310px; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(30px); border-left: var(--border); z-index: 2001; transition: 0.5s; padding: 25px; box-sizing: border-box; }
        #calc-panel.open { right: 0; }
        .calc-screen { width: 100%; height: 85px; background: #000; color: var(--green); text-align: right; font-size: 34px; padding: 20px; box-sizing: border-box; border-radius: 4px; margin-bottom: 15px; border: var(--border); font-family: monospace; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .calc-btn { background: #1a1a1a; color: #fff; padding: 18px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; border: 1px solid #333; }

        .chart-container { background: var(--card); border-radius: 12px; padding: 15px; border: var(--border); height: 260px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .total-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">$</div>
        <div style="margin-top: 15px; font-size: 12px; color: #8b949e; letter-spacing: 2px;">SPENDLOG 12.8</div>
        <div class="splash-bar"><div class="splash-progress"></div></div>
    </div>

    <div id="scanlines"></div>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="showView('daily')">Logs</div>
        <div class="nav-tab" onclick="showView('analytics')">Graphs</div>
        <div class="nav-tab" onclick="showView('bills')">Bills</div>
        <div class="nav-tab" onclick="showView('tools')">Settings</div>
    </div>

    <div id="view-daily" class="view active">
        <div class="input-group">
            <input type="date" id="date-input">
            <input type="text" id="item-input" placeholder="Tên (Xăng + Thuốc)">
            <input type="text" id="cost-input" placeholder="Giá (50k + 26k)">
            <input type="text" id="note-input" placeholder="Ghi chú (Tùy chọn)">
            <button class="btn" onclick="saveEntry()">SAVE RECEIPT</button>
        </div>
        <div id="daily-list"></div>
    </div>

    <div id="view-analytics" class="view">
        <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px;">
            <button class="btn" style="flex: 1; padding: 10px; font-size: 11px; margin: 0;" onclick="updateChart('14d')">LATEST</button>
            <button class="btn" style="flex: 1; padding: 10px; font-size: 11px; margin: 0; background: var(--gold); color:#000" onclick="updateChart('year')">YEAR</button>
            <select id="month-picker" onchange="updateChart('month')" style="flex: 2; margin: 0; height: 42px;">
                <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                <option value="3" selected>April</option><option value="4">May</option><option value="5">June</option>
                <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                <option value="9">October</option><option value="10">November</option><option value="11">December</option>
            </select>
        </div>
        <div class="chart-container"><canvas id="spendingChart"></canvas></div>
        <div id="stats-summary" style="background: var(--card); padding: 15px; border-radius: 12px; border: var(--border); font-size: 13px;"></div>
    </div>

    <div id="view-bills" class="view">
        <div class="input-group">
            <input type="text" id="bill-name" placeholder="Bill Name">
            <input type="text" id="bill-amount" placeholder="Amount (e.g. 1.5M)">
            <button class="btn" style="background:var(--danger)" onclick="addBill()">ADD BILL</button>
        </div>
        <div id="bill-list"></div>
    </div>

    <div id="view-tools" class="view">
        <div class="input-group">
            <label style="font-size: 11px; color: #8b949e; font-weight: bold; text-transform: uppercase;">Atmosphere Override</label>
            <select onchange="applyAtmosphere(this.value)" style="margin-top:10px">
                <option value="default">Default Matrix</option>
                <option value="retro">80s Retro (Synthwave)</option>
                <option value="cyber">Cyberpunk (Neon Night)</option>
                <option value="steam">Steampunk (Industry)</option>
                <option value="horror">Uncanny (Reddit Level 0)</option>
            </select>
        </div>
        <button class="btn" style="background:var(--green)" onclick="importData()">SYNC BULK REPORT</button>
        <textarea id="bulk-input" rows="8" placeholder="Paste bulk report here..." style="margin-top:12px; font-size: 11px;"></textarea>
        <button class="btn" style="background:transparent; border:1px solid var(--danger); color:var(--danger); margin-top:40px" onclick="clearAllData()">WIPE DATA</button>
    </div>

    <div id="calc-toggle" onclick="toggleCalc()">CALC</div>
    <div id="calc-panel">
        <div class="calc-screen" id="calc-display">0</div>
        <div class="calc-grid">
            <div class="calc-btn" onclick="calcInput('7')">7</div><div class="calc-btn" onclick="calcInput('8')">8</div><div class="calc-btn" onclick="calcInput('9')">9</div><div class="calc-btn" onclick="calcCmd('/')">÷</div>
            <div class="calc-btn" onclick="calcInput('4')">4</div><div class="calc-btn" onclick="calcInput('5')">5</div><div class="calc-btn" onclick="calcInput('6')">6</div><div class="calc-btn" onclick="calcCmd('*')">×</div>
            <div class="calc-btn" onclick="calcInput('1')">1</div><div class="calc-btn" onclick="calcInput('2')">2</div><div class="calc-btn" onclick="calcInput('3')">3</div><div class="calc-btn" onclick="calcCmd('-')">-</div>
            <div class="calc-btn" onclick="calcInput('0')">0</div><div class="calc-btn" onclick="calcClear()">C</div><div class="calc-btn" onclick="calcSolve()">=</div><div class="calc-btn" onclick="calcCmd('+')">+</div>
        </div>
        <button class="btn" style="margin-top:20px" onclick="toggleCalc()">CLOSE</button>
    </div>

    <div class="total-footer">TOTAL: <span id="grand-total-val">0k</span></div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        let spendings = [];
        let bills = JSON.parse(localStorage.getItem('spendlog_bills')) || [];
        let myChart = null;

        // Splash Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hide-splash');
            }, 2200);
        });

        function formatK(n) {
            let val = Math.floor(Number(n)/1000);
            return val === 0 ? "0k" : new Intl.NumberFormat('en-US').format(val) + "k";
        }

        function toBigInt(val) {
            if (!val) return 0n;
            let clean = String(val).toLowerCase().replace(/k/g, '000').replace(/[^\d]/g, '');
            return BigInt(clean || 0);
        }

        async function sync() {
            const storageData = spendings.map(s => ({ ...s, cost: s.cost.toString(), details: s.details.map(d => ({ ...d, price: d.price.toString() })) }));
            await fetch(API, {method:"POST", body:JSON.stringify(storageData)});
            localStorage.setItem('spendlog_bills', JSON.stringify(bills));
        }

        async function load() {
            try {
                const res = await fetch(API);
                const data = await res.json() || [];
                spendings = data.map(s => ({ ...s, cost: BigInt(s.cost || 0), details: s.details.map(d => ({ ...d, price: BigInt(d.price || 0), note: d.note || "" })) }));
                render();
            } catch(e) { console.error("Load failed", e); }
        }

        function render() {
            let grandTotal = 0n;
            const sorted = [...spendings].sort((a,b) => b.date.localeCompare(a.date));
            document.getElementById('daily-list').innerHTML = sorted.map(s => {
                grandTotal += s.cost;
                const dateObj = new Date(s.date + "T00:00:00");
                const dayName = dateObj.toLocaleDateString('en-US', {weekday:'short'});
                const [y, m, d] = s.date.split('-');
                return `<div class="receipt">
                    <div class="r-head">${dayName} ${d}/${m}/${y}</div>
                    ${s.details.map((item, idx) => `
                        <div class="r-row">
                            <div><b>${item.note ? item.note.toUpperCase() : item.name}</b></div>
                            <span>${formatK(item.price)} <span class="del-btn" onclick="deleteLine('${s.date}', ${idx})">×</span></span>
                        </div>
                    `).join('')}
                    <div class="r-total"><span>TOTAL</span><span>${formatK(s.cost)}</span></div>
                </div>`;
            }).join('');
            document.getElementById('bill-list').innerHTML = bills.map((b, i) => `<div class="receipt" style="background:var(--card); color:var(--text); border-left: 4px solid var(--danger)"><div class="r-row"><span>${b.name}</span><b>${b.amount} <span onclick="deleteBill(${i})" style="cursor:pointer; margin-left:12px">×</span></b></div></div>`).join('');
            document.getElementById('grand-total-val').innerText = formatK(grandTotal);
            updateChart('14d');
        }

        async function importData() {
            const input = document.getElementById('bulk-input').value;
            if (!input) return alert("Paste data first!");
            const lines = input.split('\n');
            let count = 0;
            let currentStartDate = null;
            const vnDays = { "T2": 0, "T3": 1, "T4": 2, "T5": 3, "T6": 4, "T7": 5, "CN": 6 };

            lines.forEach(line => {
                line = line.trim();
                const weekMatch = line.match(/\((\d{1,2})\/(\d{1,2})\s*-\s*\d{1,2}\/\d{1,2}\)/);
                if (weekMatch) {
                    const [_, day, month] = weekMatch;
                    currentStartDate = new Date(2026, parseInt(month)-1, parseInt(day));
                    return;
                }

                const dayMatch = line.match(/^(T2|T3|T4|T5|T6|T7|CN)\s*:\s*(.+)$/i);
                if (dayMatch && currentStartDate) {
                    const dayOffset = vnDays[dayMatch[1].toUpperCase()];
                    const entryDate = new Date(currentStartDate);
                    entryDate.setDate(currentStartDate.getDate() + dayOffset);
                    const isoDate = entryDate.toISOString().split('T')[0];

                    const parts = dayMatch[2].split('+');
                    parts.forEach(part => {
                        const priceMatch = part.match(/(\d+k|\d+)/i);
                        const noteMatch = part.match(/\((.+?)\)/);
                        if (priceMatch) {
                            const price = toBigInt(priceMatch[1]);
                            const note = noteMatch ? noteMatch[1].trim() : "";
                            const name = note ? "PURCHASE" : "EXPENSE";

                            let entry = spendings.find(s => s.date === isoDate);
                            if (!entry) { entry = { date: isoDate, cost: 0n, details: [] }; spendings.push(entry); }
                            entry.details.push({ name, price, note });
                            entry.cost = entry.details.reduce((acc, curr) => acc + curr.price, 0n);
                            count++;
                        }
                    });
                }
            });
            if (count > 0) { await sync(); render(); alert(`Successfully imported ${count} items.`); }
        }

        function updateChart(range = '14d') {
            const ctx = document.getElementById('spendingChart').getContext('2d');
            const allSorted = [...spendings].sort((a, b) => a.date.localeCompare(b.date));
            let labels = [], data = [], labelText = "";
            if (range === '14d') {
                const slice = allSorted.slice(-14);
                labels = slice.map(s => s.date.split('-').reverse().slice(0, 2).join('/'));
                data = slice.map(s => Number(s.cost) / 1000);
                labelText = "Records";
            } else if (range === 'month') {
                const selectedMonth = parseInt(document.getElementById('month-picker').value);
                const filtered = allSorted.filter(s => { const d = new Date(s.date + "T00:00:00"); return d.getMonth() === selectedMonth; });
                const daysInMonth = new Date(2026, selectedMonth + 1, 0).getDate();
                labels = Array.from({length: daysInMonth}, (_, i) => (i + 1).toString());
                data = new Array(daysInMonth).fill(0);
                filtered.forEach(s => { const dayNum = parseInt(s.date.split('-')[2]); data[dayNum - 1] += Number(s.cost) / 1000; });
                labelText = "Monthly View";
            } else if (range === 'year') {
                data = new Array(12).fill(0);
                allSorted.forEach(s => { if (new Date(s.date + "T00:00:00").getFullYear() === 2026) data[new Date(s.date + "T00:00:00").getMonth()] += Number(s.cost) / 1000; });
                labels = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                labelText = "Annual Trend";
            }
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: labelText, data, borderColor: '#58a6ff', tension: 0.3, fill: true, backgroundColor: 'rgba(88, 166, 255, 0.1)', pointRadius: 2 }]},
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true }, x: { grid: { display: false } } } }
            });
            const sum = data.reduce((a, b) => a + b, 0);
            document.getElementById('stats-summary').innerHTML = `Sum: <b style="color:var(--accent)">${new Intl.NumberFormat().format(sum)}k</b>`;
        }

        function applyAtmosphere(t) {
            const r = document.documentElement.style;
            const fx = document.getElementById('scanlines');
            fx.style.setProperty('--fx', t==='retro'?'block':'none');
            r.setProperty('--font','sans-serif'); r.setProperty('--bg-img','none'); r.setProperty('--receipt-bg','#fff'); r.setProperty('--receipt-text','#111'); r.setProperty('--card','rgba(13, 17, 23, 0.8)');
            if(t==='retro'){ r.setProperty('--bg-img',"url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070')"); r.setProperty('--accent','#ff00ff'); r.setProperty('--text','#39ff14'); r.setProperty('--border','2px solid #ff00ff'); }
            if(t==='cyber'){ r.setProperty('--bg-img',"url('https://images.unsplash.com/photo-1511447333015-45b65e60f6d5?q=80&w=2023')"); r.setProperty('--accent','#00f3ff'); r.setProperty('--text','#fff'); r.setProperty('--card','rgba(0,0,0,0.85)'); }
            if(t==='steam'){ r.setProperty('--bg-img',"url('https://cdn.80.lv/api/upload/post/8664/images/5dce5ead5f8fd/widen_2440x0.jpg')"); r.setProperty('--accent','#d4af37'); r.setProperty('--receipt-bg','#b08d57'); r.setProperty('--receipt-text','#2a1a0a'); r.setProperty('--font','serif'); }
            if(t==='horror'){ r.setProperty('--bg-img',"url('https://i.redd.it/5js9ixbe6d5b1.jpg')"); r.setProperty('--filter','sepia(0.6) contrast(1.3) brightness(0.85)'); r.setProperty('--font','monospace'); r.setProperty('--card','rgba(45, 45, 20, 0.85)'); }
        }

        async function saveEntry() {
            const d = document.getElementById('date-input').value; if(!d) return;
            const names = document.getElementById('item-input').value.split('+'), costs = document.getElementById('cost-input').value.split('+'), note = document.getElementById('note-input').value;
            let entry = spendings.find(s => s.date === d); if(!entry) { entry = {date:d, cost:0n, details:[]}; spendings.push(entry); }
            names.forEach((n, i) => entry.details.push({name:n.toUpperCase().trim(), price:toBigInt(costs[i]), note}));
            entry.cost = entry.details.reduce((acc, curr) => acc + curr.price, 0n);
            await sync(); render();
            document.getElementById('item-input').value = ""; document.getElementById('cost-input').value = ""; document.getElementById('note-input').value = "";
        }

        let calcVal = "";
        function toggleCalc() { document.getElementById('calc-panel').classList.toggle('open'); }
        function calcInput(v) { calcVal += v; updateCalc(); }
        function calcCmd(c) { calcVal += " " + c + " "; updateCalc(); }
        function calcClear() { calcVal = ""; updateCalc(); }
        function updateCalc() { document.getElementById('calc-display').innerText = calcVal || "0"; }
        function calcSolve() { try { calcVal = eval(calcVal).toString(); updateCalc(); } catch(e) { calcVal = "Error"; } }

        function addBill() { const n = document.getElementById('bill-name').value, a = document.getElementById('bill-amount').value; if(n&&a){ bills.push({name:n, amount:a}); render(); sync(); } }
        function deleteBill(i) { bills.splice(i,1); render(); sync(); }
        async function deleteLine(d, i) { const s = spendings.find(x=>x.date===d); if(s){ s.details.splice(i,1); s.cost=s.details.reduce((a,b)=>a+b.price,0n); if(!s.details.length) spendings=spendings.filter(x=>x.date!==d); await sync(); render(); }}
        async function clearAllData(){ if(confirm("Wipe all data?")){ spendings=[]; await sync(); render(); }}
        function showView(v){ document.querySelectorAll('.view').forEach(e=>e.classList.remove('active')); document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active')); document.getElementById(`view-${v}`).classList.add('active'); document.querySelector(`[onclick="showView('${v}')"]`).classList.add('active'); }
        
        document.getElementById('date-input').value = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Ho_Chi_Minh"})).toISOString().split('T')[0];
        load();
    </script>
</body>
</html>
