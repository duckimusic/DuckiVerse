<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIS Beta 2.0 - How I Spend</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0e14; --card: #161b22; --accent: #f2cc60; 
            --text: #e6edf3; --subtext: #8b949e; --border: 1px solid #30363d;
            --danger: #f85149; --success: #3fb950;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding-bottom: 80px;
        }

        /* NAVIGATION */
        .nav-bar {
            display: flex; position: sticky; top: 0; background: rgba(22, 27, 34, 0.9);
            border-bottom: var(--border); z-index: 1000; backdrop-filter: blur(12px);
        }
        .nav-item {
            flex: 1; padding: 16px 0; text-align: center; font-size: 10px;
            font-weight: 800; cursor: pointer; color: var(--subtext); text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .view { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: slideUp 0.3s ease; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* DHAMMA SECTION */
        .dhamma-box {
            background: linear-gradient(180deg, #1c2128 0%, #0a0e14 100%);
            border: 1px solid rgba(242, 204, 96, 0.3); padding: 30px 20px;
            border-radius: 20px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .quote-v { font-size: 17px; line-height: 1.6; color: var(--accent); font-weight: 500; margin-bottom: 15px; white-space: pre-line; }
        .quote-ref { font-size: 11px; color: var(--subtext); text-transform: uppercase; letter-spacing: 2px; }

        /* L.O.S.T (LOGS) */
        .input-card { background: var(--card); padding: 20px; border-radius: 15px; border: var(--border); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #30363d; color: var(--accent); border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn-save { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* CONFIRM POPUP */
        #confirm-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 9999; 
        }
        .modal-content { background: #1c2128; border: 1px solid var(--accent); padding: 30px; border-radius: 20px; text-align: center; width: 85%; }
        .modal-btns { display: flex; gap: 12px; margin-top: 25px; }
        .btn-y { flex: 1; background: var(--success); color: #fff; padding: 12px; border-radius: 8px; border: none; font-weight: bold; }
        .btn-n { flex: 1; background: var(--danger); color: #fff; padding: 12px; border-radius: 8px; border: none; font-weight: bold; }

        /* CHARTS */
        .chart-container { background: var(--card); border: var(--border); border-radius: 15px; padding: 15px; margin-bottom: 20px; height: 300px; }
        
        .receipt-lost { background: #fff; color: #111; padding: 15px; border-radius: 2px; margin-bottom: 15px; font-family: 'Courier New', Courier, monospace; box-shadow: 5px 5px 0px var(--accent); }
        .r-line { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding: 5px 0; }

        .footer-bar { position: fixed; bottom: 0; width: 100%; background: var(--accent); color: #000; padding: 18px; text-align: center; font-weight: 900; font-size: 16px; }
    </style>
</head>
<body>

    <div id="confirm-modal">
        <div class="modal-content">
            <div style="color: var(--accent); font-weight: bold; margin-bottom: 15px;">XÁC NHẬN CHÁNH NIỆM</div>
            <div id="modal-desc" style="font-size: 14px; line-height: 1.5;"></div>
            <div class="modal-btns">
                <button class="btn-y" onclick="doSave(true)">LƯU (YES)</button>
                <button class="btn-n" onclick="doSave(false)">HỦY (NO)</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showView('wheel')">Wheel</div>
        <div class="nav-item" onclick="showView('lost')">L.O.S.T</div>
        <div class="nav-item" onclick="showView('eightfold')">Eightfold</div>
        <div class="nav-item" onclick="showView('settings')">Settings</div>
    </div>

    <div id="view-wheel" class="view active">
        <div class="chart-container"><canvas id="wheelChart"></canvas></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-save" style="font-size: 11px; padding: 10px;" onclick="renderChart('week')">Tuần</button>
            <button class="btn-save" style="font-size: 11px; padding: 10px; background: #21262d; color: #fff;" onclick="renderChart('month')">Tháng</button>
        </div>
    </div>

    <div id="view-lost" class="view">
        <div class="input-card">
            <input type="date" id="in-date">
            <input type="text" id="in-name" placeholder="Item Name">
            <input type="text" id="in-price" placeholder="Price (k)">
            <textarea id="in-note" placeholder="Note..."></textarea>
            <button class="btn-save" onclick="askSave()">Save Receipt</button>
        </div>
        <div id="lost-container"></div>
    </div>

    <div id="view-eightfold" class="view">
        <div class="dhamma-box">
            <div class="quote-v" id="dhamma-text">Đang tải Kinh Pháp Cú...</div>
            <div class="quote-ref" id="dhamma-ref">Dhammapada</div>
            <button class="btn-save" style="width: auto; padding: 10px 20px; font-size: 12px;" onclick="getNewDhamma()">Another Quote</button>
        </div>

        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
            <div style="background: #1c2128; padding: 15px; border-radius: 10px; font-size: 12px; border: 1px solid #333;" onclick="alert('Chánh Kiến: Thấy rõ sự thật.')">Chánh Kiến</div>
            <div style="background: #1c2128; padding: 15px; border-radius: 10px; font-size: 12px; border: 1px solid #333;" onclick="alert('Chánh Tư Duy: Suy nghĩ thiện lành.')">Chánh Tư Duy</div>
            <div style="background: #1c2128; padding: 15px; border-radius: 10px; font-size: 12px; border: 1px solid #333;" onclick="alert('Chánh Ngữ: Lời nói chân thật.')">Chánh Ngữ</div>
            <div style="background: #1c2128; padding: 15px; border-radius: 10px; font-size: 12px; border: 1px solid #333;" onclick="alert('Chánh Nghiệp: Hành động đúng đắn.')">Chánh Nghiệp</div>
        </div>
    </div>

    <div id="view-settings" class="view">
        <div class="input-card">
            <h4>Export Data (PDF/Text)</h4>
            <button class="btn-save" style="background: #238636; color: white;" onclick="exportText()">Download .TXT Report</button>
        </div>
        <div class="input-card">
            <h4>Bulk Import</h4>
            <textarea id="bulk-in" rows="4" placeholder="Paste report here..."></textarea>
            <button class="btn-save" onclick="handleBulk()">Import</button>
        </div>
        <button class="btn-save" style="background: transparent; color: var(--danger); border: 1px solid var(--danger);" onclick="wipe()">Reset All Data</button>
    </div>

    <div class="footer-bar">HIS TOTAL: <span id="total-val">0k</span></div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        let spendings = [];
        let chartObj = null;
        let tempEntry = null;

        // KHO DỮ LIỆU KINH PHÁP CÚ (Trích lọc từ kinhphapcu.vn)
        const DHAMMA_TREASURY = [
            { v: "Tâm dẫn đầu các pháp,\nTâm làm chủ, tâm tạo.\nNếu với tâm ô nhiễm,\nKhổ não bước theo sau.", r: "Kệ số 1 - Phẩm Song Yếu" },
            { v: "Tâm dẫn đầu các pháp,\nTâm làm chủ, tâm tạo.\nNếu với tâm thanh tịnh,\nAn lạc bước theo sau.", r: "Kệ số 2 - Phẩm Song Yếu" },
            { v: "Như mái nhà vụng lợp,\nMưa liền xâm nhập vào.\nCũng vậy tâm không tu,\nTham dục liền xâm nhập.", r: "Kệ số 13 - Phẩm Song Yếu" },
            { v: "Người hăng hái, chánh niệm,\nTrong sạch, biết tự chế.\nSống thuận theo Chánh pháp,\nDanh tiếng ngày càng tăng.", r: "Kệ số 24 - Phẩm Tỉnh Giác" },
            { v: "Tâm hoảng hốt, dao động,\nKhó hộ trì, khó nhiếp.\nNgười trí làm tâm thẳng,\nNhư thợ tên nắn tên.", r: "Kệ số 33 - Phẩm Tâm" },
            { v: "Ít muốn và biết đủ,\nLà tài sản lớn nhất.\nTự tin là bạn tốt,\nNiết bàn lạc tối thượng.", r: "Kệ số 204 - Phẩm An Lạc" },
            { v: "Dầu tại bãi chiến trường,\nThắng hàng ngàn quân địch.\nTự thắng mình tốt nhất,\nChiến thắng ấy tối thượng.", r: "Kệ số 103 - Phẩm Ngàn" },
            { v: "Không làm mọi điều ác,\nThành tựu các hạnh lành.\nGiữ tâm ý trong sạch,\nLà lời chư Phật dạy.", r: "Kệ số 183 - Phẩm Phật" }
        ];

        window.onload = () => {
            document.getElementById('in-date').value = new Date().toISOString().split('T')[0];
            getNewDhamma();
            fetchData();
        };

        async function fetchData() {
            try {
                const r = await fetch(API);
                const d = await r.json() || [];
                spendings = d.map(s => ({ ...s, cost: BigInt(s.cost), details: s.details.map(i => ({ ...i, price: BigInt(i.price) })) }));
                updateUI();
            } catch(e) { console.log(e); }
        }

        function updateUI() {
            renderLOST();
            renderChart('week');
            const grand = spendings.reduce((a, b) => a + b.cost, 0n);
            document.getElementById('total-val').innerText = (Number(grand)/1000).toLocaleString() + "k";
        }

        function askSave() {
            const name = document.getElementById('in-name').value;
            const price = document.getElementById('in-price').value;
            if(!name || !price) return;
            tempEntry = {
                date: document.getElementById('in-date').value,
                name: name.toUpperCase(),
                price: BigInt(price.replace('k','')) * 1000n,
                note: document.getElementById('in-note').value
            };
            document.getElementById('modal-desc').innerText = `Bạn có chắc muốn tiêu ${price}k cho ${name}?`;
            document.getElementById('confirm-modal').style.display = 'flex';
        }

        async function doSave(yes) {
            document.getElementById('confirm-modal').style.display = 'none';
            if(yes && tempEntry) {
                let s = spendings.find(x => x.date === tempEntry.date);
                if(!s) { s = {date: tempEntry.date, cost: 0n, details: []}; spendings.push(s); }
                s.details.push({name: tempEntry.name, price: tempEntry.price, note: tempEntry.note});
                s.cost = s.details.reduce((a,b) => a+b.price, 0n);
                await sync();
                updateUI();
                document.getElementById('in-name').value = ""; document.getElementById('in-price').value = "";
            }
        }

        function renderLOST() {
            const sorted = [...spendings].sort((a,b) => b.date.localeCompare(a.date));
            document.getElementById('lost-container').innerHTML = sorted.map(s => `
                <div class="receipt-lost">
                    <div style="text-align:center; font-weight:bold; border-bottom: 1px solid #000; margin-bottom:10px;">${s.date}</div>
                    ${s.details.map((d, i) => `
                        <div class="r-line">
                            <span>${d.name}</span>
                            <span>${(Number(d.price)/1000)}k <b style="color:red;cursor:pointer" onclick="del('${s.date}',${i})">x</b></span>
                        </div>
                    `).join('')}
                    <div style="text-align:right; font-weight:bold; margin-top:5px;">TOTAL: ${(Number(s.cost)/1000)}k</div>
                </div>
            `).join('');
        }

        function renderChart(mode) {
            const ctx = document.getElementById('wheelChart').getContext('2d');
            let labels = [], data = [];
            const sorted = [...spendings].sort((a,b) => a.date.localeCompare(b.date));

            if(mode === 'week') {
                const last7 = sorted.slice(-7);
                labels = last7.map(x => x.date.split('-')[2]);
                data = last7.map(x => Number(x.cost)/1000);
            }

            if(chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: 'Spending', data, borderColor: '#f2cc60', tension: 0.4, fill: true, backgroundColor: 'rgba(242,204,96,0.1)' }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function getNewDhamma() {
            const q = DHAMMA_TREASURY[Math.floor(Math.random() * DHAMMA_TREASURY.length)];
            document.getElementById('dhamma-text').innerText = q.v;
            document.getElementById('dhamma-ref').innerText = q.r;
        }

        function showView(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function sync() {
            const out = spendings.map(s => ({ ...s, cost: s.cost.toString(), details: s.details.map(d => ({ ...d, price: d.price.toString() })) }));
            await fetch(API, {method: "POST", body: JSON.stringify(out)});
        }

        async function del(date, i) {
            const s = spendings.find(x => x.date === date);
            s.details.splice(i, 1);
            s.cost = s.details.reduce((a,b) => a+b.price, 0n);
            if(!s.details.length) spendings = spendings.filter(x => x.date !== date);
            await sync(); updateUI();
        }

        function exportText() {
            let txt = "HIS BETA 2.0 - REPORT\n====================\n";
            spendings.forEach(s => {
                txt += `\nDATE: ${s.date} | TOTAL: ${(Number(s.cost)/1000)}k\n`;
                s.details.forEach(d => txt += `- ${d.name}: ${(Number(d.price)/1000)}k\n`);
            });
            const blob = new Blob([txt], {type: "text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "HIS_Report.txt";
            a.click();
        }

        async function wipe() { if(confirm("Xóa hết?")) { spendings = []; await sync(); updateUI(); } }
    </script>
</body>
</html>
