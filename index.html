<script>
    const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
    let spendings = [];
    const dayMap = { 'T2': 1, 'T3': 2, 'T4': 3, 'T5': 4, 'T6': 5, 'T7': 6, 'CN': 0 };

    document.getElementById('date-input').valueAsDate = new Date();

    function getDayVn(dateString) {
        const days = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
        const d = new Date(dateString);
        return days[d.getDay()];
    }

    function formatMoney(num) {
        return new Intl.NumberFormat('vi-VN').format(num);
    }

    function parseSmartPrice(str) {
        if (!str) return 0;
        let val = str.toLowerCase().replace(/vnd|vnđ| /g, '');
        if (val.includes('k')) return (parseFloat(val.replace('k', '')) || 0) * 1000;
        return parseFloat(val) || 0;
    }

    async function loadData() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            spendings = Array.isArray(data) ? data : [];
            render();
        } catch (e) {
            document.getElementById('list').innerText = "CONNECTION ERROR";
        }
    }

    async function sync() {
        document.getElementById('status').innerText = "Syncing...";
        try {
            await fetch(API, { method: "POST", body: JSON.stringify(spendings) });
            document.getElementById('status').innerText = "Synced";
        } catch (e) {
            document.getElementById('status').innerText = "Sync Failed";
        }
    }

    function calculateActualDate(rangeStr, dayCode) {
        try {
            const yearMatch = rangeStr.match(/\b(20\d{2})\b/);
            const year = yearMatch ? parseInt(yearMatch[1]) : 2026;
            const match = rangeStr.match(/(\d+)\/(\d+)/);
            if (!match) return document.getElementById('date-input').value;

            const startDay = parseInt(match[1]);
            const startMonth = parseInt(match[2]) - 1;
            let d = new Date(year, startMonth, startDay);
            
            const targetDayNum = dayMap[dayCode.toUpperCase()];
            let diff = targetDayNum - 1; 
            if (targetDayNum === 0) diff = 6;
            
            d.setDate(d.getDate() + diff);
            return d.toISOString().split('T')[0];
        } catch (e) {
            return document.getElementById('date-input').value;
        }
    }

    // --- NEW STRICT PARSING ENGINE ---
    async function importData() {
        const raw = document.getElementById('bulk-input').value;
        const lines = raw.split('\n');
        let rangeHeader = lines.find(l => l.includes('/') && l.includes('(')) || "";
        let currentDayCode = null;

        lines.forEach(line => {
            if (!line.trim() || line.includes('-')) return; // Skip empty lines or the header

            // 1. Detect Day Code at start of line (e.g., "T2 :")
            const dayMatch = line.match(/^(T\d|CN)\s*:/i);
            if (dayMatch) {
                currentDayCode = dayMatch[1].toUpperCase();
            }

            if (!currentDayCode) return;

            const targetDate = calculateActualDate(rangeHeader, currentDayCode);
            
            // 2. Split by "+" but ONLY if it's NOT inside parentheses
            // This handles: 90k (item) + 15k (item)
            const segments = line.replace(/^(T\d|CN)\s*:\s*/i, '').split(/\s\+\s/);

            segments.forEach(segment => {
                // Look for: "90k (item name)"
                const partMatch = segment.match(/([\d.k]+)\s*\(([^)]+)\)/i);
                if (partMatch) {
                    const price = parseSmartPrice(partMatch[1]);
                    const nameStr = partMatch[2];
                    
                    // If multiple items in parens: (item 1 + item 2)
                    const names = nameStr.split(/\s\+\s|\//).map(n => n.trim());
                    
                    // If multiple items share one price, split the price
                    const pricePerItem = price / names.length;

                    addRecord(targetDate, names, Array(names.length).fill(pricePerItem));
                }
            });
        });

        await sync();
        render();
        toggleBulk();
        document.getElementById('bulk-input').value = "";
    }

    function addRecord(date, names, prices) {
        let entry = spendings.find(s => s.date === date);
        if (!entry) {
            entry = { date, cost: 0, details: [] };
            spendings.push(entry);
        }
        names.forEach((name, i) => {
            const p = prices[i];
            entry.details.push({ name: name.toUpperCase(), price: p });
        });
        // Recalculate total for that specific day
        entry.cost = entry.details.reduce((sum, item) => sum + item.price, 0);
    }

    function render() {
        const container = document.getElementById('list');
        if (!spendings || spendings.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#666;'>NO RECEIPTS YET</p>";
            document.getElementById('grand-total').innerText = "0";
            return;
        }

        // Filter out any invalid dates and sort
        const sorted = [...spendings]
            .filter(s => s.date && s.cost > 0)
            .sort((a,b) => new Date(b.date) - new Date(a.date));
            
        let grandTotal = 0;

        container.innerHTML = sorted.map((s) => {
            grandTotal += s.cost;
            const itemsHtml = (s.details || []).map(item => `
                <div class="item-row">
                    <span>${item.name}</span>
                    <span>${formatMoney(item.price)}</span>
                </div>
            `).join('');

            return `
                <div class="entry">
                    <div class="receipt-header">
                        <h3>SPEND LOG</h3>
                        <div style="font-size:10px;">-=-=-=-=-=-=-=-=-</div>
                        <small>${getDayVn(s.date)} (${new Date(s.date).toLocaleDateString('vi-VN')})</small>
                    </div>
                    <div class="receipt-body">${itemsHtml}</div>
                    <div class="total-row">
                        <span>TOTAL</span>
                        <span>${formatMoney(s.cost)}vnd</span>
                    </div>
                    <div class="actions">
                        <button class="btn-s" onclick="copyItem('${s.date}')">COPY</button>
                        <button class="btn-s" onclick="editItem('${s.date}')">ADD</button>
                        <button class="btn-del" onclick="deleteItem('${s.date}')">VOID</button>
                    </div>
                </div>
            `;
        }).join('');

        document.getElementById('grand-total').innerText = formatMoney(grandTotal);
    }

    async function saveEntry() {
        const date = document.getElementById('date-input').value;
        const itemInput = document.getElementById('item-input').value || "MISC";
        const costInput = document.getElementById('cost-input').value;
        if (!date || !costInput) return alert("Enter date and price");
        const names = itemInput.split('+').map(s => s.trim());
        const prices = costInput.split('+').map(s => parseSmartPrice(s.trim()));
        addRecord(date, names, prices);
        await sync();
        render();
        document.getElementById('item-input').value = "";
        document.getElementById('cost-input').value = "";
    }

    function copyItem(date) {
        const s = spendings.find(x => x.date === date);
        const items = s.details.map(d => `${d.name}: ${formatMoney(d.price)}`).join('\n');
        const text = `Spend log\n-=-=-=-=-=-\n${getDayVn(s.date)} (${new Date(s.date).toLocaleDateString('vi-VN')})\n${items}\n---------------------\nTotal : ${formatMoney(s.cost)}vnd`;
        navigator.clipboard.writeText(text);
        alert("Copied!");
    }

    function copyWeeklyReport() {
        let total = 0;
        let report = "=== WEEKLY REPORT ===\n\n";
        [...spendings].sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(s => {
            total += s.cost;
            const items = s.details.map(d => `  - ${d.name}: ${formatMoney(d.price)}`).join('\n');
            report += `${getDayVn(s.date)} (${new Date(s.date).toLocaleDateString('vi-VN')})\n${items}\nDay Total: ${formatMoney(s.cost)}vnd\n\n`;
        });
        report += `---------------------\nGRAND TOTAL: ${formatMoney(total)}vnd`;
        navigator.clipboard.writeText(report);
        alert("Full report copied!");
    }

    function editItem(date) { document.getElementById('date-input').value = date; document.getElementById('item-input').focus(); }
    async function deleteItem(date) { if(confirm("VOID?")) { spendings = spendings.filter(s => s.date !== date); await sync(); render(); } }
    function toggleBulk() { const b = document.getElementById('bulk-section'); b.style.display = b.style.display === 'none' ? 'block' : 'none'; }

    loadData();
</script>
