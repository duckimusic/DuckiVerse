<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendLog 11.7 - k-Display</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --green: #3fb950; --gold: #f2cc60; --danger: #f85149; }
        body { background: var(--bg); color: #e6edf3; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        .nav-tabs { display: flex; position: sticky; top: 0; background: #161b22; border-bottom: 1px solid #30363d; z-index: 1000; }
        .nav-tab { flex: 1; padding: 18px; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; color: #8b949e; }
        .nav-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .view { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
        .view.active { display: block; }
        .receipt { background: #fff; color: #111; padding: 15px; border-radius: 2px; margin-bottom: 15px; font-family: monospace; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .r-head { border-bottom: 1px dashed #aaa; text-align: center; padding-bottom: 8px; margin-bottom: 8px; font-weight: bold; }
        .r-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 14px; }
        .del-item { color: var(--danger); font-weight: bold; cursor: pointer; padding: 0 8px; font-size: 18px; }
        .r-total { border-top: 1px solid #000; margin-top: 8px; padding-top: 5px; display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #30363d; color: var(--accent); border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .week-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--gold); }
        .total-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent); color: white; padding: 15px; text-align: center; font-weight: bold; z-index: 100; font-size: 18px; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="showView('daily')">DAILY LOGS</div>
        <div class="nav-tab" onclick="showView('weekly')">WEEKLY TOTALS</div>
        <div class="nav-tab" onclick="showView('tools')">BULK / WIPE</div>
    </div>

    <div id="view-daily" class="view active">
        <div style="background:var(--card); padding:15px; border-radius:12px; border:1px solid #30363d">
            <input type="date" id="date-input">
            <input type="text" id="item-input" placeholder="Tên (Xăng + Thuốc)">
            <input type="text" id="cost-input" placeholder="Giá (50k + 26k)">
            <button class="btn-save" onclick="saveEntry()">SAVE RECEIPT</button>
        </div>
        <div id="daily-list" style="margin-top:20px"></div>
    </div>

    <div id="view-weekly" class="view"><div id="weekly-breakdown"></div></div>

    <div id="view-tools" class="view">
        <textarea id="bulk-input" rows="10" placeholder="Paste report here..."></textarea>
        <button class="btn-save" style="background:var(--green)" onclick="importData()">SYNC BULK REPORT</button>
        <button class="btn-save" style="background:transparent; border:1px solid var(--danger); color:var(--danger); margin-top:40px" onclick="clearAllData()">WIPE ALL DATA</button>
    </div>

    <div class="total-footer">TOTAL: <span id="grand-total-val">0</span></div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        let spendings = [];

        // NEW: Formats 12000 to "12k" and 4584000 to "4,584k"
        function formatK(n) {
            let val = Number(n);
            if (val === 0) return "0k";
            let kValue = val / 1000;
            // Use Intl to add commas to the 'k' part, e.g., 4,584k
            return new Intl.NumberFormat('en-US').format(kValue) + "k";
        }

        function toBigInt(val) {
            if (!val) return 0n;
            let clean = String(val).toLowerCase().replace(/k/g, '000').replace(/[^\d]/g, '');
            return BigInt(clean || 0);
        }

        async function sync() { 
            const storageData = spendings.map(s => ({
                ...s,
                cost: s.cost.toString(),
                details: s.details.map(d => ({ ...d, price: d.price.toString() }))
            }));
            await fetch(API, {method:"POST", body:JSON.stringify(storageData)}); 
        }

        async function load() {
            try {
                const res = await fetch(API);
                const data = await res.json() || [];
                spendings = data.map(s => ({
                    ...s,
                    cost: BigInt(s.cost || 0),
                    details: s.details.map(d => ({ ...d, price: BigInt(d.price || 0) }))
                }));
                render();
            } catch(e) { console.error("Load failed"); }
        }

        function getMondayID(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            let date = new Date(y, m - 1, d);
            let day = date.getDay();
            let diff = date.getDate() - day + (day === 0 ? -6 : 1);
            let monday = new Date(date.setDate(diff));
            return monday.toISOString().split('T')[0];
        }

        function render() {
            let grandTotal = 0n;
            let weeks = {};
            const sorted = [...spendings].sort((a,b) => new Date(b.date) - new Date(a.date));

            document.getElementById('daily-list').innerHTML = sorted.map(s => {
                grandTotal += s.cost;
                const wk = getMondayID(s.date);
                weeks[wk] = (weeks[wk] || 0n) + s.cost;
                const [y, m, d] = s.date.split('-');
                return `
                <div class="receipt">
                    <div class="r-head">${d}/${m}/${y}</div>
                    ${s.details.map((item, idx) => `
                        <div class="r-row">
                            <span>${item.name}</span>
                            <span>${formatK(item.price)} <span class="del-item" onclick="deleteLine('${s.date}', ${idx})">×</span></span>
                        </div>`).join('')}
                    <div class="r-total"><span>TOTAL</span><span>${formatK(s.cost)}</span></div>
                </div>`;
            }).join('');

            const sortedWks = Object.keys(weeks).sort((a,b) => new Date(b) - new Date(a));
            document.getElementById('weekly-breakdown').innerHTML = sortedWks.map(w => `
                <div class="week-card">
                    <span style="font-size:12px; color:#8b949e">Week of ${w}</span>
                    <span style="font-weight:900; color:var(--gold)">${formatK(weeks[w])}</span>
                </div>`).join('');

            document.getElementById('grand-total-val').innerText = formatK(grandTotal);
        }

        async function saveEntry() {
            const d = document.getElementById('date-input').value;
            if(!d) return;
            const names = document.getElementById('item-input').value.split('+');
            const costs = document.getElementById('cost-input').value.split('+');
            let entry = spendings.find(s => s.date === d);
            if(!entry) { entry = {date:d, cost:0n, details:[]}; spendings.push(entry); }
            names.forEach((n, i) => entry.details.push({name:n.toUpperCase().trim(), price:toBigInt(costs[i])}));
            entry.cost = entry.details.reduce((acc, curr) => acc + curr.price, 0n);
            await sync(); render();
            document.getElementById('item-input').value = ""; document.getElementById('cost-input').value = "";
        }

        async function importData() {
            const raw = document.getElementById('bulk-input').value;
            const segments = raw.split(/\((?=\d+\/\d+)/); 
            segments.forEach(seg => {
                const h = seg.match(/(\d+)\/(\d+)/);
                if(!h) return;
                const dMap = {'T2':0,'T3':1,'T4':2,'T5':3,'T6':4,'T7':5,'CN':6};
                seg.split('\n').forEach(line => {
                    const day = line.match(/^(T\d|CN)\s*:/i);
                    if(!day || line.includes(': X')) return;
                    let dt = new Date(2026, h[2]-1, h[1]);
                    dt.setDate(dt.getDate() + dMap[day[1].toUpperCase()]);
                    const ds = dt.toISOString().split('T')[0];
                    const nums = line.match(/\d+k?/gi);
                    const sum = nums.reduce((acc, n) => acc + toBigInt(n), 0n);
                    const name = (line.match(/\(([^)]+)\)/) || [null, "EXPENSE"])[1].toUpperCase();
                    spendings = spendings.filter(s => s.date !== ds);
                    spendings.push({date: ds, cost: sum, details: [{name, price: sum}]});
                });
            });
            await sync(); render(); document.getElementById('bulk-input').value = "";
        }

        async function deleteLine(date, idx) {
            const s = spendings.find(x => x.date === date);
            if(s){
                s.details.splice(idx, 1);
                s.cost = s.details.reduce((a,b) => a + b.price, 0n);
                if(s.details.length === 0) spendings = spendings.filter(x => x.date !== date);
                await sync(); render();
            }
        }

        async function clearAllData(){ if(confirm("Wipe everything?")){ spendings=[]; await sync(); render(); }}
        function showView(v){
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(e => e.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelector(`[onclick="showView('${v}')"]`).classList.add('active');
        }

        // Default to VN Today
        const vnNow = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Ho_Chi_Minh"}));
        document.getElementById('date-input').value = vnNow.toISOString().split('T')[0];

        load();
    </script>
</body>
</html>
