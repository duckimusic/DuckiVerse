<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendLog Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --green: #3fb950; --gold: #f2cc60; --danger: #f85149; }
        body { background: var(--bg); color: #e6edf3; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        .nav-tabs { display: flex; position: sticky; top: 0; background: #161b22; border-bottom: 1px solid #30363d; z-index: 1000; }
        .nav-tab { flex: 1; padding: 18px; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; color: #8b949e; }
        .nav-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .view { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
        .view.active { display: block; }
        .stat-focus { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #30363d; text-align: center; margin-bottom: 15px; }
        .stat-focus h1 { margin: 10px 0 0; font-size: 32px; color: var(--gold); }
        .receipt { background: #fff; color: #111; padding: 15px; border-radius: 2px; margin-bottom: 15px; font-family: monospace; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .r-head { border-bottom: 1px dashed #aaa; text-align: center; padding-bottom: 8px; margin-bottom: 8px; font-weight: bold; }
        .r-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 13px; }
        .del-item { color: var(--danger); font-weight: bold; cursor: pointer; padding: 0 8px; font-size: 18px; }
        .r-total { border-top: 1px solid #000; margin-top: 8px; padding-top: 5px; display: flex; justify-content: space-between; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #30363d; color: var(--accent); border-radius: 8px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 40px; font-size: 11px; letter-spacing: 1px; }
        .btn-save:disabled { opacity: 0.5; cursor: wait; }
        .total-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent); color: white; padding: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="showView('logs')">ENTRY</div>
        <div class="nav-tab" onclick="showView('stats')">ANALYTICS</div>
        <div class="nav-tab" onclick="showView('import')">BULK</div>
    </div>

    <div id="view-logs" class="view active">
        <div style="background:var(--card); padding:15px; border-radius:12px; border:1px solid #30363d">
            <input type="date" id="date-input">
            <input type="text" id="item-input" placeholder="Tên (Xăng + Ăn sáng)">
            <input type="text" id="cost-input" placeholder="Giá (50k + 30k)">
            <button class="btn-save" onclick="saveEntry()">SAVE RECEIPT</button>
        </div>
        <div id="list" style="margin-top:20px"></div>
    </div>

    <div id="view-stats" class="view">
        <div class="stat-focus">
            <small>Weekly Daily Avg</small>
            <h1 id="ana-daily">0₫</h1>
        </div>
        <div class="stat-focus">
            <small>Spent This Week (M-S)</small>
            <h1 id="ana-weekly" style="color:var(--accent)">0₫</h1>
        </div>
        <div class="stat-focus">
            <small>Spent This Month</small>
            <h1 id="ana-monthly" style="color:var(--green)">0₫</h1>
        </div>
    </div>

    <div id="view-import" class="view">
        <textarea id="bulk-input" rows="10" placeholder="(23/3 - 29/3)&#10;T2 : 31k (cà phê)&#10;...&#10;=> 624k"></textarea>
        <button class="btn-save" style="background:var(--green)" onclick="importData()">SYNC BULK</button>
        
        <button class="btn-save btn-danger" onclick="clearAllData()">CLEAR ALL DATA</button>
    </div>

    <div class="total-footer">GRAND TOTAL: <span id="stat-footer-total">0</span>₫</div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        let spendings = [];

        function getVnTime() { return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Ho_Chi_Minh"})); }
        function getMonday(dateObj) {
            let d = new Date(dateObj); d.setHours(0,0,0,0);
            let day = d.getDay(); let diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff)).getTime();
        }
        function format(n){ return new Intl.NumberFormat('vi-VN').format(Math.round(n)); }

        async function sync(){
            document.querySelectorAll('button').forEach(b => b.disabled = true);
            await fetch(API, {method:"POST", body:JSON.stringify(spendings)});
            document.querySelectorAll('button').forEach(b => b.disabled = false);
        }

        async function load(){
            const res = await fetch(API);
            spendings = await res.json() || [];
            render();
        }

        async function clearAllData() {
            const firstCheck = confirm("Are you sure you want to delete ALL spending history?");
            if (firstCheck) {
                const secondCheck = confirm("This CANNOT be undone. Proceed to wipe everything?");
                if (secondCheck) {
                    spendings = [];
                    await sync();
                    render();
                    showView('logs');
                }
            }
        }

        function render(){
            const vnNow = getVnTime();
            const currentMonday = getMonday(vnNow);
            const currentMonth = vnNow.getMonth();
            const currentYear = vnNow.getFullYear();

            let grandTotal = 0, weeklySum = 0, monthlySum = 0;
            const sorted = [...spendings].sort((a,b) => new Date(b.date) - new Date(a.date));

            document.getElementById('list').innerHTML = sorted.map(s => {
                const parts = s.date.split('-');
                const entryDate = new Date(parts[0], parts[1]-1, parts[2]);
                const entryMonday = getMonday(entryDate);
                grandTotal += s.cost;
                if(entryMonday === currentMonday) weeklySum += s.cost;
                if(entryDate.getMonth() === currentMonth && entryDate.getFullYear() === currentYear) monthlySum += s.cost;
                return `<div class="receipt"><div class="r-head">${parts[2]}/${parts[1]}/${parts[0]}</div>${s.details.map((i, idx) => `<div class="r-row"><span>${i.name}</span><span>${format(i.price)}₫</span><div class="del-item" onclick="deleteLine('${s.date}', ${idx})">×</div></div>`).join('')}<div class="r-total"><span>TOTAL</span><span>${format(s.cost)}₫</span></div></div>`;
            }).join('');

            document.getElementById('ana-daily').innerText = format(weeklySum / 7) + "₫";
            document.getElementById('ana-weekly').innerText = format(weeklySum) + "₫";
            document.getElementById('ana-monthly').innerText = format(monthlySum) + "₫";
            document.getElementById('stat-footer-total').innerText = format(grandTotal);
        }

        async function deleteLine(date, idx) {
            const entry = spendings.find(s => s.date === date);
            if (!entry) return;
            entry.details.splice(idx, 1);
            entry.cost = entry.details.reduce((sum, item) => sum + item.price, 0);
            if (entry.details.length === 0) spendings = spendings.filter(s => s.date !== date);
            await sync(); render();
        }

        async function saveEntry(){
            const d = document.getElementById('date-input').value;
            if(!d) return;
            const names = document.getElementById('item-input').value.split('+');
            const prices = document.getElementById('cost-input').value.split('+').map(p => {
                let v = p.toLowerCase().replace(/k/g, '000').replace(/[^\d]/g, '');
                return parseFloat(v) || 0;
            });
            let entry = spendings.find(s => s.date === d);
            if(!entry){ entry = {date:d, cost:0, details:[]}; spendings.push(entry); }
            names.forEach((n, i) => entry.details.push({name:n.toUpperCase().trim(), price:prices[i]}));
            entry.cost = entry.details.reduce((a,b) => a + b.price, 0);
            await sync(); render();
            document.getElementById('item-input').value = ""; document.getElementById('cost-input').value = "";
        }

        async function importData(){
            const raw = document.getElementById('bulk-input').value;
            const lines = raw.split('\n');
            const header = lines.find(l => l.includes('/')) || "";
            const dayMap = { 'T2':0,'T3':1,'T4':2,'T5':3,'T6':4,'T7':5,'CN':6 };
            const mMatch = header.match(/(\d+)\/(\d+)/);
            if(!mMatch) return;
            const yr = 2026;
            let weekDates = [];
            for(let i=0; i<7; i++){
                let d = new Date(yr, mMatch[2]-1, mMatch[1]);
                d.setDate(d.getDate() + i);
                weekDates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
            }
            spendings = spendings.filter(s => !weekDates.includes(s.date));
            lines.forEach(line => {
                if(line.trim().startsWith('=>')) return;
                const dm = line.match(/^(T\d|CN)\s*:/i);
                if(!dm) return;
                const targetDate = weekDates[dayMap[dm[1].toUpperCase()]];
                const regex = /([\d.k]+)\s*\(([^)]+)\)/g;
                let match;
                while((match = regex.exec(line)) !== null) {
                    const p = parseFloat(match[1].replace(/k/g, '000'));
                    const items = match[2].split(/[+/]/).map(n => n.trim());
                    let entry = spendings.find(s => s.date === targetDate);
                    if(!entry){ entry = {date:targetDate, cost:0, details:[]}; spendings.push(entry); }
                    items.forEach(it => entry.details.push({name:it.toUpperCase(), price: p/items.length}));
                    entry.cost = entry.details.reduce((a,b) => a+b.price, 0);
                }
            });
            await sync(); render(); showView('stats');
            document.getElementById('bulk-input').value = "";
        }

        function showView(v){
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(e => e.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelector(`[onclick="showView('${v}')"]`).classList.add('active');
            render();
        }

        const vnToday = getVnTime();
        document.getElementById('date-input').value = `${vnToday.getFullYear()}-${String(vnToday.getMonth()+1).padStart(2,'0')}-${String(vnToday.getDate()).padStart(2,'0')}`;
        load();
    </script>
</body>
</html>
