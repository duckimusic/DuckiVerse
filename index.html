<script>
    const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
    let spendings = [];
    document.getElementById('date-input').valueAsDate = new Date();

    function getDayVn(dateString) {
        const days = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
        const d = new Date(dateString);
        return days[d.getDay()];
    }

    // Helper to turn "31k" into 31000 or "15" into 15
    function parseSmartPrice(str) {
        let val = str.toLowerCase().replace(/vnd|vnđ| /g, '');
        if (val.includes('k')) {
            return parseFloat(val.replace('k', '')) * 1000;
        }
        return parseFloat(val) || 0;
    }

    async function loadData() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            spendings = Array.isArray(data) ? data : [];
            render();
        } catch (e) { document.getElementById('list').innerText = "CONNECTION ERROR"; }
    }

    async function saveEntry() {
        const date = document.getElementById('date-input').value;
        const itemInput = document.getElementById('item-input').value;
        const costInput = document.getElementById('cost-input').value;
        
        if (!date || !costInput) return alert("Missing Info");

        // Use the smart parser for manual entry too
        const itemNames = itemInput.split('+').map(s => s.trim());
        const costParts = costInput.split('+').map(s => parseSmartPrice(s));

        processAndAdd(date, itemNames, costParts);
        
        render();
        await sync();
        document.getElementById('cost-input').value = "";
        document.getElementById('item-input').value = "";
    }

    function processAndAdd(date, names, prices) {
        const index = spendings.findIndex(s => s.date === date);
        let currentDay;

        if (index > -1) {
            currentDay = spendings[index];
            if (!currentDay.details) currentDay.details = [{ name: currentDay.item, price: currentDay.cost }];
        } else {
            currentDay = { date, cost: 0, details: [] };
            spendings.push(currentDay);
        }

        names.forEach((name, i) => {
            const price = prices[i] !== undefined ? prices[i] : (prices[0] || 0);
            currentDay.details.push({ name: name.toUpperCase(), price: price });
        });

        currentDay.cost = currentDay.details.reduce((sum, item) => sum + item.price, 0);
    }

    async function sync() {
        document.getElementById('status').innerText = "Syncing...";
        await fetch(API, { method: "POST", body: JSON.stringify(spendings) });
        document.getElementById('status').innerText = "Synced";
    }

    function render() {
        const container = document.getElementById('list');
        if (spendings.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>NO RECORDS FOUND</p>";
            document.getElementById('grand-total').innerText = "0";
            return;
        }

        const sorted = spendings.sort((a,b) => new Date(b.date) - new Date(a.date));
        let weeklySum = 0;

        container.innerHTML = sorted.map((s, i) => {
            weeklySum += s.cost;
            const dayVn = getDayVn(s.date);
            const formattedDate = new Date(s.date).toLocaleDateString('vi-VN');
            const itemsHtml = (s.details || []).map(item => `
                <div class="item-row">
                    <span>${item.name}</span>
                    <span>${new Intl.NumberFormat('vi-VN').format(item.price)}</span>
                </div>`).join('');

            return `
                <div class="entry">
                    <div class="receipt-header">
                        <h3>SPEND LOG</h3>
                        <div style="font-size:10px;">-=-=-=-=-=-=-=-=-</div>
                        <small>${dayVn} (${formattedDate})</small>
                    </div>
                    <div class="receipt-body">${itemsHtml}</div>
                    <div class="total-row">
                        <span>TOTAL</span>
                        <span>${new Intl.NumberFormat('vi-VN').format(s.cost)}</span>
                    </div>
                    <div class="actions">
                        <button class="btn-s" onclick="copyItem(${i})">COPY</button>
                        <button class="btn-s" onclick="editItem(${i})">ADD</button>
                        <button class="btn-del" onclick="deleteItem(${i})">VOID</button>
                    </div>
                </div>`;
        }).join('');

        document.getElementById('grand-total').innerText = new Intl.NumberFormat('vi-VN').format(weeklySum);
    }

    // UPDATED BULK IMPORT FOR YOUR NEW STYLE
    async function importData() {
        const raw = document.getElementById('bulk-input').value;
        const lines = raw.split('\n');
        
        // This regex looks for: T2 : 31k (cà phê)
        const lineRegex = /^(T\d|CN)\s*:\s*([^(\n]+)\(([^)]+)\)/i;

        lines.forEach(line => {
            const match = line.match(lineRegex);
            if (match) {
                const dayCode = match[1].toUpperCase();
                const pricePart = match[2].trim();
                const namePart = match[3].trim();

                // Determine Date (Finding the closest past day matching T2, T3 etc)
                // For simplicity, this uses "Today's" week or you can manually pick a date
                const date = document.getElementById('date-input').value; 

                const names = namePart.split('+').map(n => n.trim());
                const prices = pricePart.split('+').map(p => parseSmartPrice(p));

                processAndAdd(date, names, prices);
            }
        });

        render();
        await sync();
        document.getElementById('bulk-section').style.display = 'none';
    }

    function copyWeeklyReport() {
        const sorted = spendings.sort((a,b) => new Date(a.date) - new Date(b.date));
        let total = 0;
        let report = "=== WEEKLY REPORT ===\n\n";
        sorted.forEach(s => {
            total += s.cost;
            const date = new Date(s.date).toLocaleDateString('vi-VN');
            const items = s.details.map(d => `  ${d.name} : ${new Intl.NumberFormat('vi-VN').format(d.price)}`).join('\n');
            report += `${getDayVn(s.date)} (${date})\n${items}\n=> ${new Intl.NumberFormat('vi-VN').format(s.cost)}\n\n`;
        });
        report += `---------------------\nGRAND TOTAL: ${new Intl.NumberFormat('vi-VN').format(total)}vnd`;
        navigator.clipboard.writeText(report);
        alert("Report copied!");
    }

    function copyItem(i) {
        const s = spendings[i];
        const itemsText = (s.details || []).map(item => `${item.name} : ${new Intl.NumberFormat('vi-VN').format(item.price)}`).join('\n');
        const text = `${getDayVn(s.date)} : ${new Intl.NumberFormat('vi-VN').format(s.cost)} (${s.details.map(d=>d.name.toLowerCase()).join(' + ')})`;
        navigator.clipboard.writeText(text);
        alert("COPIED!");
    }

    function editItem(i) { document.getElementById('date-input').value = spendings[i].date; document.getElementById('item-input').focus(); }
    async function deleteItem(i) { if(confirm("VOID?")) { spendings.splice(i, 1); render(); await sync(); } }

    loadData();
</script>
