<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIS 2.0 - Zen Financial Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --card: #111418; --accent: #f2cc60; 
            --text: #e6edf3; --subtext: #8b949e; --border: 1px solid #30363d;
            --danger: #f85149; --success: #3fb950;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        /* SPLASH SCREEN */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #05070a; display: flex; align-items: center; justify-content: center;
            z-index: 99999; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .zen-ring {
            width: 80px; height: 80px; border: 2px solid var(--accent);
            border-radius: 50%; border-top-color: transparent;
            animation: spin-anim 1s linear infinite;
        }
        @keyframes spin-anim { to { transform: rotate(360deg); } }
        .splash-hidden { opacity: 0; visibility: hidden; }

        /* NAVIGATION */
        .nav-bar { display: flex; position: sticky; top: 0; background: rgba(17, 20, 24, 0.95); backdrop-filter: blur(10px); border-bottom: var(--border); z-index: 1000; }
        .nav-item { flex: 1; padding: 18px 0; text-align: center; font-size: 10px; font-weight: 800; cursor: pointer; color: var(--subtext); text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .view { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }

        /* COMPONENTS */
        .card { background: var(--card); border: var(--border); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: var(--accent); border-radius: 10px; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* WHEEL AREA */
        .wheel-wrap { position: relative; width: 320px; height: 320px; margin: 25px auto; }
        #wheel-canvas { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1); }
        #pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid var(--accent); z-index: 10; }
        .wheel-hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: var(--accent); border-radius: 50%; border: 4px solid var(--bg); z-index: 5; }

        .receipt { background: #fff; color: #000; padding: 15px; border-radius: 2px; margin-bottom: 15px; font-family: monospace; border-bottom: 4px solid #999; }
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--accent); color: #000; padding: 18px; text-align: center; font-weight: 900; font-size: 20px; z-index: 900; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash"><div class="zen-ring"></div></div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('home')">Home</div>
        <div class="nav-item" onclick="nav('lost')">L.O.S.T</div>
        <div class="nav-item" onclick="nav('zen')">Eightfold</div>
        <div class="nav-item" onclick="nav('set')">Settings</div>
    </div>

    <div id="view-home" class="view active">
        <div class="card" style="height: 250px;"><canvas id="mainChart"></canvas></div>
        <div style="text-align:center; color:var(--subtext); font-size:12px;">Dòng chảy chi tiêu 7 ngày gần nhất</div>
    </div>

    <div id="view-lost" class="view">
        <div class="card">
            <input type="date" id="in-date">
            <input type="text" id="in-name" placeholder="Tên món đồ (vd: Cafe)">
            <input type="number" id="in-price" placeholder="Giá tiền (k)">
            <button class="btn-gold" onclick="saveOne()">LƯU HÓA ĐƠN</button>
        </div>
        <div id="lost-history"></div>
    </div>

    <div id="view-zen" class="view">
        <div id="zen-res" style="text-align: center; font-weight: 900; color: var(--accent); height: 40px; font-size: 24px;">HÔM NAY TU TẬP</div>
        <div class="wheel-wrap">
            <div id="pointer"></div>
            <div class="wheel-hub"></div>
            <canvas id="wheel-canvas" width="800" height="800"></canvas>
        </div>
        <button class="btn-gold" onclick="spin()">XOAY BÁT CHÁNH ĐẠO</button>
    </div>

    <div id="view-set" class="view">
        <div class="card">
            <div style="font-size: 11px; color: var(--subtext); margin-bottom: 10px; font-weight: 800;">NHẬP DỮ LIỆU NHANH (TUẦN)</div>
            <textarea id="bulk-input" placeholder="(01/04 - 07/04)&#10;T2 : 35k (Com trua) + 20 (Cafe)&#10;T3 : 50K (Xang)"></textarea>
            <button class="btn-gold" style="background: var(--success); color: #fff;" onclick="bulkImport()">IMPORT DỮ LIỆU</button>
        </div>
        <button class="btn-gold" style="background:transparent; border:1px solid var(--danger); color:var(--danger)" onclick="resetData()">RESET TOÀN BỘ</button>
    </div>

    <div class="footer">TOTAL: <span id="total-val">0k</span></div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        const PATHS = ["Chánh Kiến", "Chánh Tư Duy", "Chánh Ngữ", "Chánh Nghiệp", "Chánh Mạng", "Chánh Tinh Tấn", "Chánh Niệm", "Chánh Định"];
        let logs = [], chart = null, wheelAngle = 0;

        window.onload = () => {
            document.getElementById('in-date').value = new Date().toISOString().split('T')[0];
            drawWheel();
            load();
            setTimeout(() => document.getElementById('splash').classList.add('splash-hidden'), 2000);
        };

        async function load() {
            try {
                const res = await fetch(API);
                const data = await res.json() || [];
                logs = data.map(s => ({ ...s, cost: BigInt(s.cost), details: s.details.map(d => ({ ...d, price: BigInt(d.price) })) }));
                render();
            } catch(e) { console.error("Sync Error"); }
        }

        function render() {
            renderHistory();
            updateChart();
            const total = logs.reduce((a, b) => a + b.cost, 0n);
            document.getElementById('total-val').innerText = (Number(total)/1000).toLocaleString() + "k";
        }

        async function saveOne() {
            const n = document.getElementById('in-name').value.toUpperCase(), p = document.getElementById('in-price').value, d = document.getElementById('in-date').value;
            if(!n || !p) return;
            let s = logs.find(x => x.date === d);
            if(!s) { s = { date: d, cost: 0n, details: [] }; logs.push(s); }
            s.details.push({ name: n, price: BigInt(p)*1000n });
            s.cost = s.details.reduce((a,b) => a+b.price, 0n);
            await sync();
            document.getElementById('in-name').value = ""; document.getElementById('in-price').value = "";
        }

        async function bulkImport() {
            const raw = document.getElementById('bulk-input').value;
            const lines = raw.split('\n');
            const dateMatch = lines[0].match(/(\d{1,2})\/(\d{1,2})/);
            if(!dateMatch) return alert("Sai định dạng ngày tháng ở dòng đầu!");

            const start = new Date(new Date().getFullYear(), parseInt(dateMatch[2])-1, parseInt(dateMatch[1]));
            const dayMap = {"T2":0,"T3":1,"T4":2,"T5":3,"T6":4,"T7":5,"CN":6};
            let count = 0;

            lines.forEach(line => {
                const parts = line.split(':');
                if(parts.length < 2) return;
                const dayKey = parts[0].trim().toUpperCase();
                if(dayMap[dayKey] === undefined) return;

                const d = new Date(start); d.setDate(start.getDate() + dayMap[dayKey]);
                const dStr = d.toISOString().split('T')[0];

                const items = parts[1].match(/(\d+)[kK]?\s*\(([^)]+)\)/g);
                if(items) {
                    let s = logs.find(x => x.date === dStr);
                    if(!s) { s = { date: dStr, cost: 0n, details: [] }; logs.push(s); }
                    items.forEach(it => {
                        const m = it.match(/(\d+)[kK]?\s*\(([^)]+)\)/);
                        s.details.push({ name: m[2].toUpperCase().trim(), price: BigInt(m[1])*1000n });
                        count++;
                    });
                    s.cost = s.details.reduce((a,b) => a+b.price, 0n);
                }
            });
            if(count > 0) { await sync(); alert(`Đã nhập ${count} mục!`); document.getElementById('bulk-input').value = ""; }
        }

        async function sync() {
            const out = logs.map(s => ({ ...s, cost: s.cost.toString(), details: s.details.map(d => ({ ...d, price: d.price.toString() })) }));
            await fetch(API, {method: "POST", body: JSON.stringify(out)});
            load();
        }

        function renderHistory() {
            const hist = document.getElementById('lost-history');
            const sorted = [...logs].sort((a,b) => b.date.localeCompare(a.date));
            hist.innerHTML = sorted.map(s => `
                <div class="receipt">
                    <div style="text-align:center;border-bottom:1px solid #eee;padding-bottom:5px;font-weight:900;">${s.date}</div>
                    ${s.details.map((d, i) => `<div style="display:flex;justify-content:space-between;margin:5px 0;"><span>${d.name}</span><b>${Number(d.price)/1000}k <span style="color:red;margin-left:10px;cursor:pointer;" onclick="del('${s.date}',${i})">×</span></b></div>`).join('')}
                    <div style="text-align:right;font-weight:900;border-top:1px solid #eee;margin-top:5px;">SUM: ${Number(s.cost)/1000}k</div>
                </div>
            `).join('');
        }

        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            const last7 = [...logs].sort((a,b) => a.date.localeCompare(b.date)).slice(-7);
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: last7.map(x=>x.date.split('-')[2]), datasets: [{ data: last7.map(x=>Number(x.cost)/1000), borderColor: '#f2cc60', backgroundColor: 'rgba(242,204,96,0.1)', fill: true, tension: 0.4 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const arc = (Math.PI * 2) / 8;
            ctx.clearRect(0, 0, 800, 800);
            for(let i=0; i<8; i++) {
                const angle = i * arc;
                ctx.beginPath(); ctx.fillStyle = i%2 ? "#161b22" : "#0d1117";
                ctx.moveTo(400, 400); ctx.arc(400, 400, 380, angle, angle + arc); ctx.fill();
                ctx.save(); ctx.translate(400, 400); ctx.rotate(angle + arc/2);
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillStyle = i%2 ? "#fff" : "#f2cc60";
                ctx.font = "bold 44px sans-serif";
                const w = PATHS[i].split(' ');
                if(w.length > 1) { ctx.fillText(w[0], 250, -25); ctx.font = "34px sans-serif"; ctx.fillText(w[1], 250, 35); }
                else ctx.fillText(PATHS[i], 250, 0);
                ctx.restore();
            }
        }

        function spin() {
            const extraSpin = Math.floor(Math.random() * 360) + 3600;
            wheelAngle += extraSpin;
            document.getElementById('wheel-canvas').style.transform = `rotate(${wheelAngle}deg)`;
            document.getElementById('zen-res').innerText = "ĐANG QUÁN CHIẾU...";
            setTimeout(() => {
                const deg = wheelAngle % 360;
                const index = Math.floor(((270 - deg + 360) % 360) / 45);
                document.getElementById('zen-res').innerText = PATHS[index].toUpperCase();
            }, 5000);
        }

        function nav(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function del(d, i) {
            const e = logs.find(x=>x.date===d); e.details.splice(i,1); e.cost=e.details.reduce((a,b)=>a+b.price,0n);
            if(!e.details.length) logs=logs.filter(x=>x.date!==d);
            await sync();
        }

        async function resetData() { if(confirm("Xóa sạch toàn bộ dữ liệu?")) { await fetch(API, {method: "POST", body: JSON.stringify([])}); load(); } }
    </script>
</body>
</html>
