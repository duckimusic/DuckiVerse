<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendLog 11.3 - Final Math</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --green: #3fb950; --gold: #f2cc60; --danger: #f85149; }
        body { background: var(--bg); color: #e6edf3; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        .nav-tabs { display: flex; position: sticky; top: 0; background: #161b22; border-bottom: 1px solid #30363d; z-index: 1000; }
        .nav-tab { flex: 1; padding: 18px; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; color: #8b949e; }
        .nav-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .view { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
        .view.active { display: block; }
        .week-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--gold); }
        .week-amount { font-size: 18px; font-weight: 900; color: var(--gold); }
        .receipt { background: #fff; color: #111; padding: 15px; border-radius: 2px; margin-bottom: 15px; font-family: monospace; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .r-head { border-bottom: 1px dashed #aaa; text-align: center; padding-bottom: 8px; margin-bottom: 8px; font-weight: bold; }
        .r-row { display: flex; justify-content: space-between; margin: 6px 0; font-size: 13px; }
        .r-total { border-top: 1px solid #000; margin-top: 8px; padding-top: 5px; display: flex; justify-content: space-between; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #30363d; color: var(--accent); border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .total-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="showView('daily')">DAILY</div>
        <div class="nav-tab" onclick="showView('weekly')">WEEKLY</div>
        <div class="nav-tab" onclick="showView('tools')">BULK / WIPE</div>
    </div>

    <div id="view-daily" class="view active"><div id="daily-list"></div></div>
    <div id="view-weekly" class="view"><div id="weekly-breakdown"></div></div>
    <div id="view-tools" class="view">
        <textarea id="bulk-input" rows="10" placeholder="Paste data here..."></textarea>
        <button class="btn-save" style="background:var(--green)" onclick="importData()">SYNC BULK REPORT</button>
        <button class="btn-save" style="background:var(--danger)" onclick="clearAllData()">WIPE ALL DATA</button>
    </div>

    <div class="total-footer">TOTAL: <span id="grand-total-val">0</span>₫</div>

    <script>
        const API = "https://lil-flower-35d8.davidbong808.workers.dev/";
        let spendings = [];

        function format(n){ return new Intl.NumberFormat('vi-VN').format(Math.floor(n)); }

        async function sync(){ await fetch(API, {method:"POST", body:JSON.stringify(spendings)}); }

        async function load(){
            const res = await fetch(API);
            spendings = await res.json() || [];
            render();
        }

        function getMondayID(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            let date = new Date(y, m - 1, d);
            let day = date.getDay();
            let diff = date.getDate() - day + (day === 0 ? -6 : 1);
            let monday = new Date(date.setDate(diff));
            return `${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
        }

        function render(){
            let grandTotal = 0;
            let weeklyBuckets = {};
            const sortedDaily = [...spendings].sort((a,b) => new Date(b.date) - new Date(a.date));

            document.getElementById('daily-list').innerHTML = sortedDaily.map(s => {
                grandTotal += s.cost;
                const mID = getMondayID(s.date);
                weeklyBuckets[mID] = (weeklyBuckets[mID] || 0) + s.cost;
                const [y, m, d] = s.date.split('-');
                return `
                <div class="receipt">
                    <div class="r-head">${d}/${m}/${y}</div>
                    ${s.details.map(item => `<div class="r-row"><span>${item.name}</span><span>${format(item.price)}₫</span></div>`).join('')}
                    <div class="r-total"><span>TOTAL</span><span>${format(s.cost)}₫</span></div>
                </div>`;
            }).join('');

            const sortedWeeks = Object.keys(weeklyBuckets).sort((a,b) => new Date(b) - new Date(a));
            document.getElementById('weekly-breakdown').innerHTML = sortedWeeks.map(wk => `
                <div class="week-card">
                    <span style="font-size:12px; color:#8b949e">Week starting ${wk}</span>
                    <span class="week-amount">${format(weeklyBuckets[wk])}₫</span>
                </div>`).join('');

            document.getElementById('grand-total-val').innerText = format(grandTotal);
        }

        async function importData(){
            const raw = document.getElementById('bulk-input').value;
            const segments = raw.split(/\((?=\d+\/\d+)/); 

            segments.forEach(segment => {
                const header = segment.match(/(\d+)\/(\d+)/);
                if(!header) return;

                const startDay = parseInt(header[1]);
                const startMonth = parseInt(header[2]);
                const dayMap = { 'T2':0,'T3':1,'T4':2,'T5':3,'T6':4,'T7':5,'CN':6 };
                
                segment.split('\n').forEach(line => {
                    const dayKey = line.match(/^(T\d|CN)\s*:/i);
                    if(!dayKey || line.includes(': X')) return;

                    let dt = new Date(2026, startMonth - 1, startDay);
                    dt.setDate(dt.getDate() + dayMap[dayKey[1].toUpperCase()]);
                    const ds = dt.toISOString().split('T')[0];

                    // THE FIX: Extract ALL numbers and sum them
                    const priceMatches = line.match(/\d+k?/gi);
                    if(!priceMatches) return;
                    
                    const dailySum = priceMatches.reduce((acc, p) => {
                        let val = p.toLowerCase().replace('k', '000');
                        return acc + parseInt(val);
                    }, 0);

                    const nameMatch = line.match(/\(([^)]+)\)/);
                    const itemName = nameMatch ? nameMatch[1].toUpperCase() : "EXPENSE";

                    spendings = spendings.filter(s => s.date !== ds);
                    spendings.push({ date: ds, cost: dailySum, details: [{ name: itemName, price: dailySum }] });
                });
            });

            await sync(); render(); document.getElementById('bulk-input').value = "";
        }

        async function clearAllData() { if(confirm("Wipe all?")) { spendings = []; await sync(); render(); } }

        function showView(v){
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(e => e.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelector(`[onclick="showView('${v}')"]`).classList.add('active');
        }

        load();
    </script>
</body>
</html>
